                // JOBS/CAREERS
                "software engineer": "Software engineers design, build, and maintain software applications and systems. Requirements: programming knowledge (Python, Java, C++), problem-solving skills, degree in CS or related field. Salary: $100-180k+. Demand: very high. Skills: coding, debugging, testing, design patterns.",
                "data scientist": "Data scientists analyze data to extract insights and build predictive models. Requirements: statistics, Python/R, machine learning knowledge. Salary: $110-160k+. Use: libraries like pandas, scikit-learn, TensorFlow. Roles: analysis, modeling, visualization.",
                "product manager": "Product managers oversee product development from concept to launch. Requirements: leadership, strategy, communication skills. Salary: $120-200k+. Responsibilities: roadmap, user research, feature prioritization, cross-team coordination.",
                "ux designer": "UX designers create user-centered product experiences. Requirements: design skills, user research, prototyping tools (Figma, Adobe XD). Salary: $80-140k+. Focus: usability, accessibility, user satisfaction, interface design.",
                "devops engineer": "DevOps engineers manage infrastructure, deployment, and system reliability. Requirements: Linux, Docker, Kubernetes, CI/CD pipelines. Salary: $120-180k+. Tools: Jenkins, GitLab, AWS, monitoring systems. Focus: automation, scalability.",
                "accountant": "Accountants manage financial records and tax compliance. Requirements: accounting degree, CPA certification desirable. Salary: $50-90k+. Duties: bookkeeping, tax preparation, auditing, financial reporting.",
                "nurse": "Nurses provide patient care in hospitals and clinics. Requirements: nursing degree (ADN/BSN), RN license, certifications. Salary: $60-90k+. Specialties: pediatrics, ICU, oncology, surgery. Focus: patient care, safety, comfort.",
                "teacher": "Teachers educate students in schools. Requirements: bachelor's degree, teaching license, subject knowledge. Salary: $40-70k+. Duties: lesson planning, grading, assessment, student development. Impact: shaping future generations.",
                "lawyer": "Lawyers provide legal advice and representation. Requirements: law degree (JD), bar exam pass. Salary: $80-200k+ (varies by specialty). Specialties: corporate, criminal, family, environmental. Duties: case management, research, advocacy.",
                "doctor": "Doctors diagnose and treat diseases. Requirements: medical degree (MD/DO), residency, licensure. Salary: $150-290k+ (varies by specialty). Specialties: surgery, pediatrics, cardiology, psychiatry. Duties: diagnosis, treatment, patient care.",
                "architect": "Architects design buildings and structures. Requirements: architecture degree, licensure. Salary: $70-129k+. Duties: design, planning, project management, CAD work. Focus: safety, aesthetics, sustainability.",
                "chef": "Chefs prepare meals and manage kitchens. Requirements: culinary arts training, experience. Salary: $40-90k+. Specialties: pastry, cuisine types, fine dining. Skills: knife skills, food safety, creativity, management.",
                "electrician": "Electricians install and repair electrical systems. Requirements: apprenticeship, licensing. Salary: $50-90k+. Skills: wiring, safety, troubleshooting, code knowledge. Settings: residential, commercial, industrial.",
                "plumber": "Plumbers install and repair water systems. Requirements: apprenticeship, licensing. Salary: $50-100k+. Skills: pipe fitting, problem-solving, safety, customer service. Work: residential, commercial, maintenance.",
                "mechanic": "Mechanics repair and maintain vehicles. Requirements: technical training, certifications. Salary: $40-80k+. Specialties: automotive, aircraft, diesel. Skills: diagnostics, repair, tool proficiency, attention to detail.",
                "pilot": "Pilots operate aircraft for transport or other purposes. Requirements: pilot license, training hours, medical certification. Salary: $80-200k+ (varies by airline/role). Responsibilities: safety, navigation, passenger comfort, regulations.",
                "marketer": "Marketers promote products and services. Requirements: marketing degree, analytics skills, creativity. Salary: $50-120k+. Specialties: digital, content, social media, SEO. Duties: campaigns, analytics, branding, customer engagement.",
                "sales representative": "Sales reps sell products/services to customers. Requirements: communication skills, product knowledge, persuasion. Salary: $40-100k+ (commission-based). Skills: negotiation, relationship building, closing deals, persistence.",
                "hr manager": "HR managers handle employee relations and recruitment. Requirements: HR degree, employee knowledge, communication skills. Salary: $60-120k+. Duties: hiring, training, policy compliance, conflict resolution, benefits management.",
                "project manager": "Project managers oversee projects from planning to completion. Requirements: organization, leadership, communication, PMP certification desirable. Salary: $80-140k+. Tools: Asana, Monday.com, Jira. Skills: planning, coordination, risk management.",
                "graphic designer": "Graphic designers create visual content. Requirements: design degree, software skills (Adobe Creative Suite). Salary: $45-100k+. Work: logos, websites, marketing materials, branding. Skills: color theory, typography, composition.",
                "writer": "Writers create content for various media. Requirements: writing skills, degree optional. Salary: $40-100k+ (varies by niche). Types: journalism, technical, fiction, copywriting, blogging. Skills: research, editing, storytelling.",
                "journalist": "Journalists research and report news stories. Requirements: journalism degree, ethics knowledge, writing skills. Salary: $35-80k+. Work: newspapers, online, TV, radio. Skills: investigation, interviewing, deadline management.",
                "consultant": "Consultants provide expert advice to businesses. Requirements: industry expertise, MBA desirable. Salary: $80-200k+ (often project-based). Specialties: management, IT, financial, strategy. Skills: analysis, communication, problem-solving.",
                "analyst": "Analysts examine data and trends for insights. Requirements: analytical skills, relevant degree. Salary: $50-120k+. Types: business, financial, systems, data. Tools: Excel, Tableau, SQL, Python.",
                "manager": "Managers oversee teams and operations. Requirements: leadership, experience, relevant skills. Salary: $60-150k+. Duties: hiring, evaluation, planning, resource allocation, team development.",
                "director": "Directors oversee entire departments or divisions. Requirements: extensive experience, advanced degree optional. Salary: $120-250k+. Duties: strategic planning, budgeting, performance, executive decisions.",
                "cto": "CTO (Chief Technology Officer) leads technology strategy. Requirements: technical expertise, leadership, vision. Salary: $150-290k+ (plus equity). Duties: technology decisions, team management, innovation, security.",
                "ceo": "CEO (Chief Executive Officer) leads entire organization. Requirements: business acumen, leadership, experience. Salary: $200-500k+ (plus bonuses/equity). Duties: strategy, vision, stakeholder relations, performance.",
                
                // MATH & NUMBERS
                "what is algebra": "Algebra is branch of mathematics using variables and symbols to solve equations. Deals with relationships and structures. Concepts: variables (x, y), equations, functions, polynomials. Used in: science, engineering, economics. Foundation for advanced math.",
                "what is geometry": "Geometry studies shapes, space, and dimensions. Concepts: points, lines, angles, polygons, circles, 3D shapes. Theorems: Pythagorean, parallel lines. Applications: construction, engineering, art. Proves relationships spatially.",
                "what is calculus": "Calculus studies rates of change (derivatives) and accumulation (integrals). Tools: limits, derivatives, integrals. Applications: physics, engineering, economics. Isaac Newton and Leibniz developed independently. Essential for advanced science.",
                "what is statistics": "Statistics analyzes data to find patterns. Concepts: mean, median, mode, variance, standard deviation, probability. Uses: sampling, hypothesis testing, regression. Applications: research, business, medicine. Informs data-driven decisions.",
                "what is probability": "Probability measures likelihood of events. Range: 0 (impossible) to 1 (certain). Concepts: outcomes, sample space, conditional probability. Bayes' theorem: updates beliefs. Law of large numbers: predictions improve with more trials.",
                "what is pi": "Pi (π) is mathematical constant ≈ 3.14159. Ratio of circle's circumference to diameter. Appears in: circle formulas, trigonometry, physics. Irrational number (infinite non-repeating decimals). Named after Greek letter. Extensively computed; known to trillions decimal places.",
                "what is fibonacci": "Fibonacci sequence: 0, 1, 1, 2, 3, 5, 8, 13... Each number = sum of previous two. Found in: nature (spirals, leaves), art, finance. Golden ratio: ratio of consecutive fibonacci numbers → φ ≈ 1.618. Named after Leonardo Fibonacci.",
                "prime number": "Prime number is integer > 1, divisible only by 1 and itself. Examples: 2, 3, 5, 7, 11, 13, 17. Infinite primes exist. Fundamental to cryptography, factorization. Unique factorization theorem: every integer = unique prime product.",
                "what is factorial": "Factorial (n!) = n × (n-1) × ... × 2 × 1. Example: 5! = 5×4×3×2×1 = 120. Uses: permutations, combinations, probability. 0! = 1 (definition). Grows very rapidly. Used in: discrete math, statistics, calculus.",
                "what is derivative": "Derivative measures rate of change of function. Represents slope of tangent line at point. Notation: f'(x) or df/dx. Concept: instantaneous rate of change. Applications: optimization, physics (velocity, acceleration), economics. Foundation of calculus.",
                "what is integral": "Integral represents area under curve or accumulation. Opposite of derivative (anti derivative). Definite integral: specific area between limits. Indefinite integral: general antiderivative (includes constant C). Applications: physics, engineering, probability.",
                "what is matrix": "Matrix is rectangular array of numbers. Dimensions: m × n (m rows, n columns). Operations: addition, multiplication, transposition. Uses: solving systems of equations, computer graphics, data science. Determinant = special property; inverse = reciprocal.",
                "what is vector": "Vector has magnitude and direction. Represented: [x, y] (2D) or [x, y, z] (3D). Operations: addition, subtraction, dot product, cross product. Applications: physics, graphics, navigation. Distinguished from scalar (magnitude only).",
                "what is percentage": "Percentage = number per 100. Symbol: %. Formula: (part/whole) × 100. Example: 25% = 0.25 = 1/4. Calculations: discounts, interest, growth rates. Percent change = (new-old)/old × 100. Used: finance, statistics, everyday comparisons.",
                "what is ratio": "Ratio compares two quantities. Notation: a:b or a/b. Example: 3:5 means 3 parts to 5 parts. Equivalent ratios: scale proportionally. Proportion: equation of two ratios. Uses: cooking recipes, maps, model scaling, finance.",
                "what is square root": "Square root of number (√n) = value that when multiplied by itself = n. Example: √16 = 4 (since 4×4=16). Radical: √ symbol. Perfect square: integer result (1, 4, 9, 16...). Irrational results: non-terminating decimals (√2 ≈ 1.414).",
                "what is exponent": "Exponent shows how many times number multiplies itself. Notation: b^n (b to power n). Example: 2^3 = 2×2×2 = 8. Base: b, exponent: n. Laws: product rule (a^m × a^n = a^(m+n)), power rule ((a^m)^n = a^(mn)). Zero exponent: b^0 = 1.",
                "what is logarithm": "Logarithm inverse of exponent. log_b(x) = y means b^y = x. Example: log_10(100) = 2 (since 10^2=100). Common log: base 10. Natural log (ln): base e. Properties: product rule, quotient rule, power rule. Applications: decibels, pH, Richter scale.",
                
                // MORE KNOWLEDGE BASE
                "why study": "Education provides: knowledge, skills, credentials, opportunities, critical thinking, confidence. Benefits: better employment, higher income, personal growth, informed citizenship. Enables: career choices, problem-solving, understanding world.",
                "how to study": "1) Create quiet environment 2) Set goals 3) Use active learning (not just reading) 4) Take breaks every 25-50 min 5) Teach others to reinforce learning 6) Use multiple resources 7) Review regularly 8) Sleep well 9) Practice problems frequently.",
                "how to memorize": "1) Spaced repetition: review at intervals 2) Mnemonics: memory aids 3) Chunking: break info into parts 4) Association: link to known concepts 5) Visual imagery: create mental pictures 6) Active recall: test yourself 7) Teach others 8) Sleep after learning 9) Exercise improves memory.",
                "how to improve english": "1) Read daily (newspapers, books, articles) 2) Watch movies/shows with subtitles 3) Practice speaking (join clubs, talk to natives) 4) Write regularly (journal, essays, posts) 5) Learn grammar rules 6) Expand vocabulary (flashcards, daily words) 7) Listen to podcasts/music 8) Use language apps.",
                "how to be confident": "1) Practice and prepare thoroughly 2) Focus on strengths 3) Challenge negative self-talk 4) Set achievable goals 5) Celebrate small wins 6) Help others (builds purpose) 7) Good posture affects confidence 8) Dress professionally 9) Fake it till you make it 10) Continuous learning.",
                "how to manage stress": "1) Exercise regularly 2) Deep breathing and meditation 3) Adequate sleep (7-9 hours) 4) Time management 5) Social support 6) Hobbies/relaxation 7) Limit caffeine 8) Set boundaries 9) Professional help if needed 10) Positive self-talk.",
                "how to save money": "1) Track spending 2) Create budget 3) Cut unnecessary expenses 4) Automate savings transfers 5) Cook at home 6) Use coupons 7) Buy generic brands 8) Cancel unused subscriptions 9) Negotiate bills 10) Invest excess (compound growth).",
                "how to invest": "1) Start with emergency fund 2) Educate yourself (books, courses) 3) Open brokerage account 4) Start small, diversify 5) Buy index funds for beginners 6) Avoid high-fee products 7) Dollar-cost averaging 8) Long-term perspective 9) Avoid emotional trading 10) Rebalance portfolio annually.",
                "how to negotiate": "1) Prepare thoroughly 2) Know market rates 3) Listen more than talk 4) Ask questions 5) Don't accept first offer 6) Make counteroffer 7) Focus on interests, not positions 8) Find win-win solutions 9) Stay calm 10) Get agreements in writing.",
                "how to communicate": "1) Listen actively 2) Speak clearly and concisely 3) Use body language 4) Ask clarifying questions 5) Adapt to audience 6) Avoid jargon 7) Admit mistakes 8) Show empathy 9) Give feedback constructively 10) Practice regularly.",
                "how to network": "1) Attend industry events 2) Join professional groups 3) Use LinkedIn effectively 4) Reach out to connections 5) Help others (reciprocity) 6) Follow up after meetings 7) Be genuine 8) Listen more than self-promote 9) Build relationships, not just contacts 10) Maintain connections over time.",
                "how to overcome fear": "1) Identify fear source 2) Gather knowledge (fear decreases with understanding) 3) Start small 4) Gradual exposure 5) Breathing techniques 6) Positive self-talk 7) Visualization (success) 8) Social support 9) Professional help 10) Action defeats fear.",
                "how to be happy": "1) Gratitude practice 2) Help others 3) Maintain relationships 4) Exercise regularly 5) Spend time in nature 6) Pursue meaningful goals 7) Practice mindfulness 8) Get quality sleep 9) Limit social media 10) Learn to forgive.",
                // SPACE & ASTRONOMY
                "what is pulsar": "Pulsar is rapidly rotating neutron star emitting radio waves. Discovered by Jocelyn Bell. Pulse frequency: very regular (like cosmic clocks). Used in: navigation, tests of relativity. Lighthouse effect: beam sweeps across space. Millisecond pulsars: spin 600+ times/second.",
                "what is neutron star": "Neutron star is extremely dense collapsed core of massive star. Mass: ~1.4-2 sun masses, radius: ~10 km. Density: teaspoon weighs 6 billion tons. Forms from: supernova explosion. Future evolution: black hole if massive enough.",
                "what is white dwarf": "White dwarf is dense remnant of dead star. Mass: similar to sun, size: earth-size. Forms from: low-mass star death. Cools slowly over billions of years. In binary systems: can accrete material, eventually explode (Type Ia supernova).",
                "what is red giant": "Red giant is evolved massive star. Expanded outer layers, cooler surface (red). Forms when: star fuses hydrogen in shell. Helium burning occurs in core. Eventually: sheds outer layers (planetary nebula), becomes white dwarf.",
                "what is supernova": "Supernova is massive stellar explosion. Type Ia: white dwarf explodes (accretion from companion). Type II: core collapse of massive star. Brightness: can outshine entire galaxy. Creates: heavy elements, neutron stars, black holes. Remnants: nebulae.",
                "what is degenerate matter": "Degenerate matter is extremely dense material where quantum effects dominate. Electron degeneracy pressure: whitewharf support. Neutron degeneracy pressure: neutron star support. Pauli exclusion principle: prevents collapse. Properties: temperature-independent density.",
                "what is gravitational lensing": "Gravitational lensing is bending of light by massive objects (gravity). Einstein predicted; observed in 1919. Uses: studying dark matter, distant galaxies, exoplanets. Microlensing: small foreground objects magnify distant stars. Strong lensing: multiple images, Einstein rings, arcs.",
                "what is dark energy": "Dark energy is mysterious force accelerating universe expansion. ~68% of universe's energy density. Einstein's cosmological constant? Quintessence? Unknown. Evidence: Type Ia supernova dimness. Opposite effect of gravity. Leading cosmological puzzle.",
                "what is hubble space telescope": "Hubble Space Telescope orbits Earth; studies universe. Orbit: 569 km altitude. Mirror: 2.4 meters. Launched: 1990. Achievements: Hubble constant measurement, age of universe, deep field observations. Legacy: transformative observations. Successor: James Webb Space Telescope.",
                "what is james webb": "James Webb Space Telescope launched 2021. Specialized in: infrared observations. Advantages: studies early universe, star/planet formation, exoplanet atmospheres. Orbit: Sun-Earth L2 point. Temperature: extremely cold (45K) for infrared sensitivity. Successor to Hubble.",
                
                // BIOLOGY
                "what is photosynthesis": "Photosynthesis: plants convert sunlight → glucose + oxygen. Occurs in: chloroplasts (chlorophyll). Equation: 6CO2 + 6H2O + light → C6H12O6 + 6O2. Light reactions: water splits, ATP/NADPH produced. Calvin cycle: CO2 fixed to glucose. Powers: nearly all life on Earth.",
                "what is mitochondria": "Mitochondria are cellular powerhouses. Function: ATP production (energy). Location: cytoplasm. Structure: double membrane, inner cristae, matrix. DNA: own DNA (maternal inheritance). Origin: endosymbiotic theory. Numbers: 100s-1000s per cell. Process: aerobic respiration (glucose → ATP).",
                "what is photosynthesis vs respiration": "Photosynthesis: light energy → chemical energy (glucose), produces O2, occurs in plants. Respiration: glucose → ATP (energy), uses O2, occurs in all organisms. Opposite processes. Both essential: photosynthesis stores energy, respiration releases it for use.",
                "what is chlorophyll": "Chlorophyll is green pigment in plants (chloroplasts). Absorbs light (blue, red). Reflects green light (why plants are green). Aids photosynthesis. Types: chlorophyll a (main), b, c, d. Central atom: magnesium. Found in: algae, cyanobacteria, plants.",
                "what is enzyme": "Enzyme is protein catalyst accelerating reactions. Functions: break bonds (catabolic), form bonds (anabolic). Specificity: each enzyme catalyzes one reaction. Cofactors: sometimes need metal ions/vitamins. Denaturation: heat/pH destroys structure. Name: usually ends in '-ase'.",
                "what is hormone": "Hormone is signaling molecule regulating body functions. Types: peptide (insulin), steroid (cortisol), amino acid derivatives (epinephrine). Production: endocrine glands. Travel: through bloodstream. Effects: growth, metabolism, reproduction, mood, stress response.",
                "what is metabolism": "Metabolism is chemical reactions in cells for energy/growth. Catabolism: breaks molecules (releases energy). Anabolism: builds molecules (requires energy). Basal metabolic rate: energy at rest. Factors: age, sex, genetics, activity level, muscle mass. Thyroid hormone regulates.",
                "what is phototropism": "Phototropism is plant growth toward light. Mechanism: auxin (hormone) redistribution in response to light. Shaded side accumulates auxin → more growth → bends toward light. Adaptive: maximizes light exposure. Demonstrated by: Darwin's experiments (1880).",
                "what is homeostasis": "Homeostasis is body's maintenance of stable internal conditions. Examples: body temperature (37°C), pH (~7.4), blood glucose (70-100 mg/dL). Mechanisms: negative feedback (corrects deviation), positive feedback (rare, amplifies change). Essential for: survival, function.",
                "what is cellular respiration": "Cellular respiration is glucose breakdown for ATP production. Stages: glycolysis (cytoplasm, 2 ATP), Krebs cycle (mitochondrial matrix, 2 ATP), electron transport (inner membrane, ~34 ATP). Aerobic: requires O2; produces 36-38 ATP. Anaerobic: lactate fermentation (~2 ATP).",
                "what is photosynthesis light dependent": "Light-dependent reactions (thylakoid): 1) Photosystem II absorbs light → water splits → O2, electrons 2) Electron transport chain → Photosystem I 3) Electrons reduce NADP+ → NADPH 4) Chemiosmosis → ATP synthesis. Products: ATP, NADPH, O2. Essential for: Calvin cycle.",
                "what is photosynthesis light independent": "Light-independent reactions (Calvin cycle, stroma): 1) CO2 fixation (RuBP → 3PG, enzyme RuBisCO) 2) Reduction (3PG → G3P, uses ATP/NADPH) 3) Regeneration (G3P → RuBP). Products: glucose. Occurs: regardless of light (but requires ATP/NADPH). Temperature-dependent.",
                "what is cell division": "Cell division is process of cell reproduction. Mitosis: produces identical daughter cells (growth, repair). Meiosis: produces gametes (4 haploid cells, genetic variation). Stages: prophase, metaphase, anaphase, telophase, cytokinesis. Controlled by: cyclins, checkpoints. Cancer: uncontrolled division.",
                "what is mutation": "Mutation is change in DNA sequence. Types: substitution (one base changed), insertion (added bases), deletion (removed bases), inversion (reversed), translocation (moved). Effects: silent (no change), missense (protein altered), nonsense (stop codon). Causes: replication errors, radiation, chemicals. Evolution driven by mutations.",
                "what is gene expression": "Gene expression is process of DNA → RNA → protein. Transcription: DNA → mRNA (nucleus). Translation: mRNA → protein (ribosome). Regulation: promoters, enhancers, repressors control expression. Epigenetic: environmental factors affect expression without changing DNA. Cell differentiation results from selective expression.",
                " growth": "Growth is the increase in size, quantity, value, or importance over time. It's a fundamental concept found in biology (organisms increasing in size), economics (increase in GDP), business (revenue/scale), personal development (skills/knowledge), and technology (advancement). Growth can be measured quantitatively (percentage increase, absolute change) and qualitatively (improvement in quality). Understanding growth helps in planning, setting goals, and measuring progress across all domains.",
                "personal growth": "Personal growth is the continuous process of self-improvement and development. It involves: 1) Developing new skills and abilities 2) Expanding knowledge and understanding 3) Improving emotional intelligence 4) Building better habits 5) Overcoming challenges and fears 6) Setting and achieving meaningful goals 7) Building self-confidence and resilience. Key strategies: read daily, seek mentorship, practice consistently, embrace feedback, step outside your comfort zone, reflect regularly, and maintain a growth mindset. Personal growth leads to better relationships, career opportunities, and overall happiness.",
                "business growth": "Business growth refers to the expansion of a company's revenue, market share, customer base, or operations. Types of growth: 1) Organic growth (internal expansion through sales) 2) Inorganic growth (acquisitions, mergers) 3) Market development (new markets) 4) Product development (new products). Key metrics: revenue growth rate, customer acquisition cost, lifetime value, market share. Strategies: product innovation, marketing excellence, strategic partnerships, operational efficiency, scaling operations. Challenges: maintaining quality during scaling, cash flow management, competition, regulatory compliance. Successful growth requires balanced focus on customer satisfaction, team development, and financial sustainability.",
                "economic growth": "Economic growth is the increase in a country's production of goods and services over time, measured by GDP (Gross Domestic Product) growth. Factors driving economic growth: 1) Increase in capital (machines, factories) 2) Labor force expansion 3) Technological innovation 4) Better education and skills 5) Natural resources. Benefits: higher living standards, more jobs, better public services, poverty reduction. Challenges: inflation, inequality, environmental impact. Countries aim for sustainable growth (3-5% annually) that balances economic, social, and environmental considerations. GDP per capita is a key measure of prosperity.",
                "population growth": "Population growth is the increase in the number of people in an area over time. Calculated as: (Births + Immigration) - (Deaths + Emigration). Current world growth: ~0.9% annually (81 million people). Factors affecting growth: birth rate, death rate, migration, age structure, healthcare, education, economic conditions. Types: exponential growth (rapid), logistic growth (slowing as resources limit). Challenges: resource scarcity, environmental strain, infrastructure needs, food security, unemployment. Many developed nations face low growth or decline, while some developing countries still experience rapid population increase.",
                "what is development": "Development is the process of positive change and improvement in society, economy, or individuals. Types: 1) Human development (health, education, living standards) 2) Economic development (income, infrastructure, industrialization) 3) Social development (equality, rights, quality of life) 4) Sustainable development (balancing economic, environmental, social goals). Measured by: HDI (Human Development Index), GDP per capita, literacy rates, life expectancy, poverty rates. Key concepts: quality of life, capabilities approach, social progress. Goal: sustainable development that meets present needs without compromising future generations.",
                "how to achieve growth": "Achieving growth requires strategic action: 1) Set clear, measurable goals with timelines 2) Invest in continuous learning and skill development 3) Take consistent daily action toward your objectives 4) Track progress and measure results 5) Adapt strategies based on feedback and data 6) Build on small wins for momentum 7) Seek feedback from mentors, customers, peers 8) Stay motivated through visualization and celebration 9) Be patient - growth takes time 10) Invest in yourself through education, health, relationships. Success is a journey of continuous improvement!",
                "growth mindset": "Growth mindset, developed by psychologist Carol Dweck, is the belief that abilities and intelligence can be developed through dedication, hard work, and learning from failure. Key principles: 1) Challenges are opportunities to grow 2) Effort leads to mastery 3) Feedback is constructive 4) Success of others inspires rather than threatens 5) Failure is not final - it's feedback. Benefits: greater resilience, more learning, better relationships, higher achievement. vs Fixed mindset (belief abilities are static). To develop: embrace challenges, persist through obstacles, see effort as path to success, learn from criticism, find inspiration in others' success. Essential for personal and professional growth.",
                "growth hacking": "Growth hacking is a data-driven, experimental approach to rapid business growth focusing on low-cost, high-impact strategies. Key principles: 1) Product-market fit first 2) Focus on entire funnel (acquisition, activation, retention, revenue, referral) 3) Rapid experimentation and iteration 4) Use data to guide decisions. Tactics: viral loops, referral programs, content marketing, SEO, A/B testing, social media engagement, community building, strategic partnerships. Famous examples: Dropbox (referral program), Hotmail (signature marketing), Airbnb (Craigslist integration). Unlike traditional marketing, growth hacking is creative, analytical, and focused on exponential growth with minimal budget.",
                "career growth": "Career growth is professional advancement through increased responsibilities, skills, compensation, and influence. Key factors: 1) Continuous skill development 2) Building a strong professional network 3) Taking on challenging projects 4) Developing leadership abilities 5) Communicating your value 6) Seeking feedback and mentoring 7) Adapting to change. Strategies: set 5-year goals, find mentors, volunteer for visibility, develop soft skills, stay current with industry trends, build personal brand, negotiate promotions. Warning signs of stagnation: no new challenges, skill plateau, exclusion from decisions. Remember: career growth is a marathon, not a sprint - invest in long-term development over quick wins.",
                "financial growth": "Financial growth is the increase in your wealth and financial security over time. Principles: 1) Live below your means (spend less than you earn) 2) Invest regularly (dollar-cost averaging) 3) Diversify investments (reduce risk) 4) Compound interest works over time 5) Emergency fund first (3-6 months expenses) 6) Pay off high-interest debt 7) Maximize tax-advantaged accounts. Steps: track spending, create budget, save 20%+ of income, invest in diversified portfolio (index funds), increase income over time. Growth rates: historically 7-10% annual return in stocks. Time is your biggest asset - start early! Wealth building is a long-term game of patience and consistency.",
                "spiritual growth": "Spiritual growth is the development of deeper connection to your inner self, purpose, and meaning in life. It involves: 1) Self-reflection and meditation 2) Exploring beliefs and values 3) Developing compassion and gratitude 4) Finding purpose and meaning 5) Connecting with nature and others 6) Letting go of negative patterns. Practices: prayer, meditation, journaling, reading spiritual texts, mindful living, service to others. Benefits: inner peace, better relationships, resilience, clarity, reduced stress. Everyone's path is unique - explore what resonates with you. Growth in this area leads to greater fulfillment and wisdom.",
                "emotional growth": "Emotional growth is developing greater awareness, understanding, and control over your emotions. Key aspects: 1) Emotional awareness (recognizing feelings) 2) Emotional expression (healthy communication) 3) Emotional regulation (managing reactions) 4) Empathy (understanding others) 5) Resilience (recovering from setbacks). Strategies: practice mindfulness, keep emotion journal, develop healthy coping mechanisms, seek therapy when needed, build supportive relationships. Benefits: better mental health, improved relationships, enhanced decision-making, greater life satisfaction. Emotional intelligence (EQ) is often more important than IQ for success and happiness.",
                "intellectual growth": "Intellectual growth is the expansion of knowledge, critical thinking, and cognitive abilities. Ways to grow: 1) Read widely and regularly 2) Learn new skills and languages 3) Engage in thoughtful discussions 4) Question assumptions 5) Solve puzzles and problems 6) Travel and experience new cultures 7) Take courses and certifications. Benefits: better problem-solving, creativity, career opportunities, broader perspective, adaptability. Keep your mind active like you keep your body fit. The learning never stops - stay curious!",
                "physical growth": "Physical growth refers to changes in body size and function. In humans: rapid growth in childhood, puberty growth spurt (2-3 years), reaching adult size by late teens. Factors: genetics, nutrition, health, hormones, exercise. Peak physical performance: 20s-30s for most. After 30: gradual decline in muscle mass, bone density, metabolism. Ways to support healthy growth: proper nutrition (protein, vitamins, minerals), adequate sleep (8-10 hours for teens), regular exercise, good posture. As adults, focus on maintaining rather than growing. Life-long fitness improves quality of life.",
                // CHEMISTRY ADVANCED
                "what is valence electron": "Valence electrons are outermost shell electrons. Determine: chemical properties, bonding behavior. Represented by: Lewis dot structures. Loss/gain/sharing: forms ions or covalent bonds. Main group elements: indicated by group number (IA = 1 valence, IIA = 2, etc).",
                "what is chemical bond": "Chemical bond is force holding atoms together. Ionic: electron transfer, opposite charges attract. Covalent: electron sharing. Metallic: electron sea. Hydrogen bond: weak, between H and N/O/F. Bond strength: affects molecule stability, reactivity.",
                "what is oxidation state": "Oxidation state is number of electrons lost/gained by atom. Positive: electrons lost. Negative: electrons gained. Rules: uncombined element = 0, monoatomic ion = charge, O = -2 (usually), H = +1 (usually). Redox reaction: oxidation state changes.",
                "what is redox reaction": "Redox (oxidation-reduction) is electron transfer reaction. Oxidation: loss of electrons, increase in oxidation state. Reduction: gain of electrons, decrease in oxidation state. Oxidizing agent: accepts electrons. Reducing agent: donates electrons. Balanced by: electron transfer.",
                "what is ph scale": "pH measures acidity/basicity. Formula: pH = -log[H+]. Scale: 0-14. pH < 7: acidic, pH = 7: neutral, pH > 7: basic. Buffer: resists pH change. Pka: acid dissociation constant. Strong acid: pH 0-1, weak acid: pH 2-6. Strong base: pH 13-14.",
                "what is acid base neutralization": "Acid-base neutralization is reaction between acid and base. Produces: salt + water. Equation: HCl + NaOH → NaCl + H2O. Endpoint: pH 7 (complete neutralization). Titration: quantitative acid-base analysis. Buffer solution: resists pH change.",
                "what is dissolved oxygen": "Dissolved oxygen is O2 gas dissolved in water. Source: atmosphere, photosynthesis. Importance: respiration for aquatic life. Saturation: depends on temperature (inverse relationship), pressure. Hypoxia: low DO; eutrophication causes. Measured: mg/L or % saturation.",
                "what is catalyst": "Catalyst is substance that speeds reaction without being consumed. Mechanism: lowers activation energy. Enzyme: biological catalyst. Homogeneous: same phase as reactants. Heterogeneous: different phase. Poison: reduces catalyst efficiency. Examples: Pt in catalytic converter, MnO2 in H2O2 decomposition.",
                "what is equilibrium": "Equilibrium is state where forward reaction rate = reverse reaction rate. Constant: Keq (ratio of products to reactants). Le Chatelier principle: system responds to shifts. Shifts: changes in temperature, pressure, concentration. Most reactions don't go 100% to completion.",
                "what is electrochemistry": "Electrochemistry is study of electron transfer in chemical reactions. Components: oxidation (loss e-), reduction (gain e-). Galvanic cell: spontaneous redox produces current (battery). Electrolytic cell: current drives non-spontaneous reaction. Applications: batteries, plating, refining.",
                
                // WORLD FACTS
                "tallest mountain": "Mount Everest, Himalayas, Nepal/China border. Height: 8,849 metres (29,032 feet). First ascent: 1953 (Edmund Hillary, Tenzing Norgay). Deaths: ~290+ due to altitude, weather, avalanches. Climb difficulty: extreme. Alternate name (Nepali): Sagarmatha.",
                "deepest ocean": "Mariana Trench, Western Pacific Ocean (near Guam). Deepest point: Challenger Deep, 10,994 metres (36,070 feet). Pressure: extreme. Darkness: absolute. Life: chemosynthetic organisms. Exploration: very limited due to depth.",
                "largest ocean": "Pacific Ocean. Area: 165 million km². Deepest: Mariana Trench. Widest: spans nearly half Earth's circumference. Temperature: varies greatly. Rich biodiversity. Named: by Magellan ('Mar Pacifico' = peaceful sea).",
                "largest continent": "Asia. Area: 44.5 million km². Population: 4.6 billion (~60% world). Countries: 48. Largest by area: Russia (partly in Europe). Diverse: climates, cultures, economies. Contains: highest mountain (Everest), largest lake (Caspian Sea).",
                "smallest continent": "Australia (Oceania). Area: 7.7 million km². Population: 26 million. Countries: 1 (Australia is both country and continent). Unique: marsupials, isolated evolution. Island continent surrounded by ocean.",
                "hottest place": "Death Valley, California, USA. Record: 54.4°C (129.9°F) in July 1913. Lowest elevation: -86 m (Badwater Basin). Annual rainfall: <5 cm. Conditions: extremely dry, intense sun. Tourism: remarkable despite harsh climate.",
                "coldest place": "East Antarctic Plateau, Antarctica. Temperature: -89.2°C recorded (-128.6°F). Conditions: extremely cold, high altitude, thin atmosphere. Uninhabited. Research stations closer to coast. Coldest inhabited place: Oymyakon, Russia (-67.7°C recorded).",
                "largest desert": "Antarctic Desert. Area: 14.2 million km². Type: cold desert (polar). Precipitation: mainly snow. Temperature: extremely cold. Largest hot desert: Sahara, Africa (9 million km²).",
                "largest island": "Greenland (Kalaallit Nunaat). Area: 2.166 million km². Population: ~56,000 (sparse). Autonomous territory: Denmark. Climate: Arctic. Mostly: ice sheet. Greenlandic spoken, Danish as second language.",
                "largest lake": "Caspian Sea (technically a lake). Area: 371,000 km². Borders: 5 countries. Depth: 1,025 m (deepest). Saltwater. Fish: caviar-producing sturgeon. Ecological concern: polluted.",
                "longest river": "Nile River, Africa. Length: 6,650 km. Flows: south to north (unusual). Countries: 11. Importance: civilization (ancient Egypt). Source: Lake Victoria. Delta: Nile Delta (fertile, Cairo). Modern use: irrigation, hydroelectric power.",
                "most spoken language": "Mandarin Chinese. Speakers: 1.1+ billion (native). Second: Spanish (500+ million native). English: most spoken second language globally. Tonal: Mandarin has 4-5 tones. Characters: 50,000+ in dictionary, 3,000-4,000 for fluency.",
                "most populated country": "India. Population: 1.4+ billion (overtook China 2023). Density: very high. Languages: 22 official, 700+ spoken. Religion: Hindu majority, diverse faiths. Growth: slowing. Economy: developing, IT sector strong.",
                "most visited country": "France. Tourists: 90+ million annually. Attractions: Eiffel Tower, Louvre, Versailles. Cities: Paris, Marseille, Lyon. Tourism revenue: major economic factor. Diverse: culture, cuisine, history.",
                "richest country": "Luxembourg (by GDP per capita). GDP/capita: ~$140,000. Area: small. Finance-based economy. Monaco: also very rich (~$191,000 GDP/capita). Qatar: high (oil). By total GDP: USA, China, Japan.",
                "most dangerous animal": "Mosquito (human perspective). Deaths: 750,000+/year (malaria, dengue, Zika, yellow fever). Followed by: humans (murders, accidents), snakes (100,000+/year), dogs (25,000/year via rabies).",
                "fastest land animal": "Cheetah. Speed: 120 km/h (75 mph) in short bursts. Acceleration: 0-100 km/h in 3 seconds. Sprinters: not endurance runners. Hunts: small gazelles. Unique: non-retractable claws (traction).",
                "fastest animal": "Peregrine falcon. Speed: 390 km/h (240 mph) in dive. Uses: hunting pigeons mid-air. Eyesight: 8x human. Not sustained speed; brief dive.",
                "heaviest animal": "Blue whale. Weight: 200 tons. Length: 29 m. Largest creature ever. Diet: krill (small shrimp), filters through baleen. Endangered: previously hunted extensively. Heart: organ-sized, 400 lbs.",
                "largest land animal": "African elephant. Weight: 6-7 tons. Height: 4 m. Brain: largest land animal. Intelligence: high, emotional. Social: herds matriarchal. Trunk: 40,000+ muscles, 150 kg lift capacity.",
                "smartest animal": "Debate: great apes (chimps, gorillas) highly intelligent, dolphins (intelligence, communication), elephants (memory, emotion), octopuses (problem-solving, camouflage). Metrics vary: problem-solving, social learning, self-awareness.",
                "oldest animal": "Greenland shark. Lifespan: 290-500+ years (oldest known: 400+ years). Oldest verifiable: Harriet (Galapagos tortoise), 175 years. Oldest living: Jonathan tortoise, 190+ years.",
                
                // DATES & HISTORY
                "when was internet created": "ARPANET created: 1969 (first packet-switched network). WWW invented: 1989 (Tim Berners-Lee at CERN). Commercial internet: 1990s. Global adoption: 2000s+. Key milestones: first email (1971), Mosaic browser (1993), Google (1998).",
                "when was telephone invented": "Alexander Graham Bell patented: 1876. First successful transmission: transmitted words (\"Mr. Watson, come here...\"). Improvements: Edison's carbon microphone. Commercial service: 1878. Rotary dial: 1891. Cellular phones: 1973 (Martin Cooper, Motorola).",
                "when was airplane invented": "Wright brothers: December 17, 1903 (Kitty Hawk, North Carolina). Flight: 12 seconds, 36.5 meters. Followed by: longer flights, improvements. Commercial aviation: 1920s. Jet engines: WWII era. Modern commercial: 1950s+ (Boeing 707).",
                "when was computer invented": "Analytical Engine (design): 1837 (Charles Babbage). Electronic computer (ENIAC): 1946. Personal computers: 1970s-1980s. Modern era: vast computational power. Transistor invented: 1947 (Bell Labs). Integrated circuits: 1960s. Moore's law: exponential growth.",
                "when was electricity discovered": "Ancient times: static electricity observed. Ben Franklin: 1752 (kite experiment, lightning). Alessandro Volta: 1800 (electric battery). Michael Faraday: 1821 (electromagnetic induction). Edison: 1879 (practical light bulb). Nikola Tesla: AC power systems.",
                "when was pencil invented": "Ancient origins: graphite sticks found. Modern pencil: 1560s (graphite + wood combination). Mass production: 1800s. Mechanical pencil: late 1800s. Variations: HB (hardness/blackness scale), 9H (hardest) to 9B (darkest).",
                "when was rubber invented": "Natural rubber: Hevea tree (Amazon). Charles Goodyear: 1844 (vulcanization process, improves durability). Synthetic rubber: WWII era (substitution). Modern use: tires, erasers, countless products. Production: Brazil, Indonesia, Malaysia major producers.",
                "when was plastic invented": "Early plastics: cellulose nitrate (1800s). Bakelite (Leo Baekeland): 1907 (first fully synthetic). Polyethylene (LDPE): 1933. PVC: 1920s. Polypropylene: 1954. Modern crisis: plastic pollution, microplastics. Recyclability: varies by type.",
                "when was vaccine created": "Edward Jenner: 1796 (smallpox vaccine, first vaccine). Pasteur: rabies vaccine, 1885. Vaccines: train immune system, prevent disease. Types: live attenuated, inactivated, subunit, mRNA (modern). Success: polio eliminated (nearly), smallpox eradicated.",
                "when was anesthesia discovered": "William Morton: October 16, 1846 (ether anesthesia, public surgery). Before: patients felt pain, alcohol, opium used. Impact: revolutionized surgery. Types: local (numbs area), general (unconsciousness), regional (nerve blocks). Safety: modern monitoring.",

        function createLeagueTableHTML(league) {
            const data = getLeagueTable(league);
            if (!data) return null;

            let html = `<div class="league-title">${data.title}</div>`;
            html += `<table class="league-table"><thead><tr>`;
            html += `<th class="pos">Pos</th><th class="team-name">Team</th><th class="stat">P</th><th class="stat">W</th><th class="stat">D</th><th class="stat">L</th>`;
            
            // Determine if goals (GF/GA) or points difference
            if (data.teams[0].gf) {
                html += `<th class="stat">GF</th><th class="stat">GA</th>`;
            }
            html += `<th class="stat">Pts</th></tr></thead><tbody>`;

            for (const team of data.teams) {
                html += `<tr><td class="pos">${team.pos}</td><td class="team-name">${team.team}</td>`;
                html += `<td class="stat">${team.p}</td><td class="stat">${team.w}</td><td class="stat">${team.d}</td><td class="stat">${team.l}</td>`;
                if (team.gf) {
                    html += `<td class="stat">${team.gf}</td><td class="stat">${team.ga}</td>`;
                }
                html += `<td class="stat"><strong>${team.pts}</strong></td></tr>`;
            }

            html += `</tbody></table>`;
            return html;
        }

        function createFixturesHTML(league) {
            const data = getFixtures(league);
            if (!data) return null;

            let html = `<div class="league-title">${data.title}</div>`;
            html += `<table class="league-table"><thead><tr>`;
            html += `<th style="width: 60px;">Date</th><th style="width: 50px;">Time</th><th style="flex-grow: 1;">Home Team</th><th style="width: 29px;">vs</th><th style="flex-grow: 1;">Away Team</th><th style="width: 70px;">Status</th></tr></thead><tbody>`;

            for (const fixture of data.fixtures) {
                const statusColor = fixture.status === 'Live' ? '#ff6b6b' : fixture.status === 'Completed' ? '#95e1d3' : '#ffffff';
                html += `<tr><td style="font-weight: bold; text-align: center;">${fixture.date}</td>`;
                html += `<td style="text-align: center; color: #888;">${fixture.time}</td>`;
                html += `<td style="text-align: right; padding-right: 10px;">${fixture.home}</td>`;
                html += `<td style="text-align: center; color: #666;">vs</td>`;
                html += `<td style="text-align: left; padding-left: 10px;">${fixture.away}</td>`;
                html += `<td style="text-align: center; color: ${statusColor}; font-weight: bold; font-size: 11px;">${fixture.status}</td></tr>`;
            }

            html += `</tbody></table><br>`;
            return html;

        // Main query processor
        async function processQuery(query) {
            // Check for banned content
            if (containsBannedContent(query)) {
                return "❌ I cannot answer that question. I'm designed to be helpful, harmless, and honest. Please ask me something constructive instead! I'm happy to help with learning, problem-solving, creative questions, or information about good topics.";
            }

            const lowerQuery = query.toLowerCase();
            
            // Check for very short or unclear queries - return "I don't understand" immediately
            if (query.length < 3 || /^[a-zA-Z]$/.test(query.trim())) {
                return "😕 I don't understand, please spell correctly. Try rephrasing your question or check your spelling.";
            }
            
            // ========================
            // IMAGE CREATION REQUEST (Higher Priority)
            // ========================
            const imageTriggers = ['create an image', 'generate an image', 'draw an image', 'make an image', 'create picture', 'generate picture', 'draw picture', 'make picture', 'create graphic', 'design image', 'create an image', 'generate an image'];
            
            if (imageTriggers.some(t => lowerQuery.includes(t))) {
                return await createImage(query);
            }
            
            // ========================

            // ========================
            const quoteTriggers = ['quote', 'proposal', 'quotation', 'price', 'estimate', 'invoice'];
            
            if (quoteTriggers.some(t => lowerQuery.includes(t))) {
                return await createQuote(query);

            const codeTriggers = ['write code', 'create code', 'make code', 'generate code', 'code for', 'write program', 'create program', 'write function', 'create function', 'javascript', 'write a', 'create a'];
            
            if (codeTriggers.some(t => lowerQuery.includes(t)) && !lowerQuery.includes('image') && !lowerQuery.includes('picture')) {

            // ========================

            const isGreeting = greetings.some(g => lowerQuery.includes(g)) && 
                (lowerQuery.length < 30 || /^(hello|hi|hey|yo|rexona|howdy|morning|afternoon|evening|night)/.test(lowerQuery));
            
            if (isGreeting && !lowerQuery.includes('what') && !lowerQuery.includes('how') && !lowerQuery.includes('?')) {

                    "💫 Hi! Welcome! I'm REXONA AI - your intelligent assistant. From complex questions to simple hellos, I'm happy to help!"
                ];
                return greetingResponses[Math.floor(Math.random() * greetingResponses.length)];
            }

            // Check for time-based greetings
            const hour = new Date().getHours();
            let timeGreeting = '';
            if (hour >= 5 && hour < 12) timeGreeting = '☀️ Good morning';
            else if (hour >= 12 && hour < 17) timeGreeting = '🌤️ Good afternoon';
            else if (hour >= 17 && hour < 21) timeGreeting = '🌙 Good evening';
            else timeGreeting = '🌃 Good night';

            if (lowerQuery === 'morning' || lowerQuery === 'afternoon' || lowerQuery === 'evening' || lowerQuery === 'night') {
                return `${timeGreeting}! ${hour >= 21 || hour < 5 ? 'Time to rest!' : 'How can I help you today?'}`;
            }
            
            // Farewell detection
            const farewells = ['bye', 'goodbye', 'see you', 'later', 'take care', 'farewell', 'gotta go', 'have to go', 'cya'];
            if (farewells.some(f => lowerQuery.includes(f))) {
                const farewellResponses = [

                    "🌟 Take care! Don't forget - REXONA AI is always here when you need answers!",

                return farewellResponses[Math.floor(Math.random() * farewellResponses.length)];
            }

            // ========================
            // TRANSLATION REQUESTS
            // ========================
            const translateTriggers = [
                'translate', 'translation', 'translate to', 'translate from', 
                'say in', 'in spanish', 'in french', 'in german', 'in chinese',
                'in japanese', 'in korean', 'in portuguese', 'in italian',
                'what is in', 'how do you say', 'convert to', 'convert from'
            ];
            
            const isTranslateRequest = translateTriggers.some(t => lowerQuery.includes(t));
            
            if (isTranslateRequest) {
                // Detect target language
                let targetLang = 'en';
                let textToTranslate = query;
                
                const langMap = {
                    'spanish': 'es', 'espanol': 'es', 'in spanish': 'es',
                    'french': 'fr', 'in french': 'fr', 'francais': 'fr',
                    'german': 'de', 'in german': 'de', 'deutsch': 'de',
                    'chinese': 'zh', 'in chinese': 'zh', 'mandarin': 'zh',
                    'japanese': 'ja', 'in japanese': 'ja', 'nippon': 'ja',
                    'korean': 'ko', 'in korean': 'ko', 'hangul': 'ko',

                    'hindi': 'hi', 'in hindi': 'hi',
                    'pidgin': 'pidgin', 'nigerian': 'pidgin', 'pidgin english': 'pidgin',
                    'english': 'en', 'in english': 'en'
                };
                
                for (const [lang, code] of Object.entries(langMap)) {
                    if (lowerQuery.includes(lang)) {
                        targetLang = code;
                        // Extract the text to translate
                        const patterns = [
                            new RegExp(`translate (.*) to ${lang}`, 'i'),
                            new RegExp(`say (.*) in ${lang}`, 'i'),
                            new RegExp(`how do you say (.*) in ${lang}`, 'i'),
                            new RegExp(`(.*) in ${lang}`, 'i'),
                            new RegExp(`translate to ${lang}:?\s*(.*)`, 'i'),
                            new RegExp(`(.*) to ${lang}`, 'i')
                        ];
                        
                        for (const pattern of patterns) {
                            const match = query.match(pattern);
                            if (match && match[1]) {
                                textToTranslate = match[1].trim();
                                break;
                            }
                        }
                        break;
                    }
                }
                
                if (targetLang !== 'en' || textToTranslate !== query) {
                    // Perform translation
                    const langNames = {
                        'es': 'Spanish', 'fr': 'French', 'de': 'German', 'zh': 'Chinese',
                        'ja': 'Japanese', 'ko': 'Korean', 'pt': 'Portuguese', 'it': 'Italian',
                        'ru': 'Russian', 'ar': 'Arabic', 'hi': 'Hindi', 'pidgin': 'Pidgin English'
                    };
                    
                    const translated = await translateText(textToTranslate, targetLang);
                    const langName = langNames[targetLang] || targetLang;
                    return `🌐**Translation to ${langName}:**
"${translated}"`;
                }
            }

            // Video generation/creation requests
            if (/video|create video|generate video|make video|film|youtube|vimeo/i.test(lowerQuery)) {
                const videoQuery = query.replace(/video|create|generate|make|film/gi, '').trim();
                const videoResult = await generateVideo(videoQuery || query);
                return videoResult;
            }

            // Image generation/creation requests
            if (/generate image|create image|draw|paint|ai art|dall-e|midjourney/i.test(lowerQuery)) {
                const imageQuery = query.replace(/generate|create|draw|paint|image/gi, '').trim();
                const imageGenResult = await generateImage(imageQuery || query);
                return imageGenResult;
            }

            // Code generation/creation requests
            if (/code|program|script|function|class|python|javascript|java|c\+\+|html|css/i.test(lowerQuery)) {
                const codeResult = await generateCode(query, lowerQuery);
                return codeResult;
            }

            // Math detection
            if (/[\d\+\-\*\/\(\)\^]/.test(query) || /calculate|math|solve|equals/.test(lowerQuery)) {
                const mathResult = await solveMath(query);
                if (mathResult) return mathResult;
            }

            // Image search/display requests
            if (/image|picture|photo|show|see/i.test(lowerQuery)) {
                const imageQuery = query.replace(/image|picture|photo|show|see/gi, '').trim();
                const imageResult = await searchImages(imageQuery || query);
                if (imageResult) return imageResult;
            }

            // League table requests
            const leagueKeywords = ['league table', 'standings', 'league standings', 'table', 'premier league', 'epl', 'la liga', 'serie a', 'ligue 1', 'bundesliga', 'champions league', 'eredivisie', 'primeira', 'mls', 'all leagues', 'fixture', 'fixtures', 'match', 'matches', 'upcoming', 'schedule', 'kick off', 'kickoff'];
            const isLeagueQuery = leagueKeywords.some(keyword => lowerQuery.includes(keyword));
            
            if (isLeagueQuery) {
                let leagueTableHTML = '';
                
                // Check if asking for fixtures
                const isFixtureQuery = /fixture|match|game|kick|upcoming|schedule/i.test(lowerQuery);
                
                if (lowerQuery.includes('all leagues') || lowerQuery.includes('all tables') || lowerQuery.includes('all fixtures')) {
                    // Show all major leagues with both fixtures and tables
                    const leagues = ['premier league', 'la liga', 'serie a', 'ligue 1', 'bundesliga', 'champions league', 'eredivisie', 'primeira', 'mls'];
                    for (const league of leagues) {
                        if (isFixtureQuery) {
                            const fixtures = createFixturesHTML(league);
                            if (fixtures) leagueTableHTML += fixtures;
                        } else {
                            const table = createLeagueTableHTML(league);
                            if (table) leagueTableHTML += table;
                        }
                    }
                    return leagueTableHTML || "No data found. Try: Premier League, La Liga, Serie A, Ligue 1, Bundesliga, Champions League";
                } else {
                    // Detect specific league (including aliases like epl for premier league)
                    const leagues = ['premier league', 'la liga', 'serie a', 'ligue 1', 'bundesliga', 'champions league'];
                    
                    // Check for EPL alias
                    if (lowerQuery.includes('epl')) {
                        if (isFixtureQuery) {
                            const fixtures = createFixturesHTML('premier league');
                            const table = createLeagueTableHTML('premier league');
                            return (fixtures || '') + (table || '');
                        } else {
                            const table = createLeagueTableHTML('premier league');
                            if (table) return table;
                        }
                    }
                    
                    for (const league of leagues) {
                        if (lowerQuery.includes(league)) {
                            if (isFixtureQuery) {
                                const fixtures = createFixturesHTML(league);
                                const table = createLeagueTableHTML(league);
                                return (fixtures || '') + (table || '');
                            } else {
                                const table = createLeagueTableHTML(league);
                                if (table) return table;
                            }
                        }
                    }
                    // If no specific league found, show popular ones
                    if (lowerQuery.includes('table') || lowerQuery.includes('standings')) {
                        const defaultLeague = createLeagueTableHTML('premier league');
                        if (defaultLeague) return defaultLeague;
                    }
                    // If asking for all fixtures/matches
                    if (isFixtureQuery && (lowerQuery.includes('all') || lowerQuery.includes('fixtures'))) {
                        const leagues = ['premier league', 'la liga', 'serie a', 'ligue 1', 'bundesliga', 'champions league'];
                        for (const league of leagues) {
                            const fixtures = createFixturesHTML(league);
                            if (fixtures) leagueTableHTML += fixtures;

                        return leagueTableHTML || "No fixtures found";

            }

            // Try Wikipedia for factual topics

                bgColor1 = '#2e7d32'; bgColor2 = '#1b5e20'; symbol = '⚽'; title = 'SPORTS';

        async function sendMessage() {
            let text = messageInput.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, true);
            messageInput.value = '';
            messageInput.focus();

            // Show typing
            addMessage("REXONA is thinking...", false);
            const typingMessage = messagesDiv.lastChild;

            // Process query
            let result = await processQuery(text);
            
            // Translate output if needed
            const outputLang = outputLanguageSelect.value;
            if (outputLang !== 'en') {
                result = await translateText(result, outputLang);
            }

            // Show result
            typingMessage.remove();
            addMessage(result, false, true);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
