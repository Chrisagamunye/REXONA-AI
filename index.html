                "what is javascript": "JavaScript is the web's primary language that brings interactivity to browsers. It can also run on servers (Node.js) and power mobile apps.",
                "what is artificial intelligence": "AI is computer systems that perform tasks requiring human-level intelligence: learning, reasoning, problem-solving, and decision-making. It powers recommendations, image recognition, and autonomous systems.",
                "what is machine learning": "Machine learning is AI where algorithms learn patterns from data without explicit programming. It enables recommendations, image recognition, language understanding, and predictions.",
                "what is deep learning": "Deep learning uses neural networks with many layers to process complex data. It powers ChatGPT, image generation, voice assistants, and autonomous vehicles.",
                "what is neural network": "Neural networks are systems inspired by brains, made of interconnected nodes. They learn by adjusting connection weights based on data.",
                "what is blockchain": "Blockchain is a distributed ledger secured by cryptography. Data is stored in blocks linked together. It powers Bitcoin and decentralized applications.",
                "what is cryptocurrency": "Cryptocurrencies are digital money secured by cryptography. Bitcoin was first; thousands exist now. They enable peer-to-peer transactions without intermediaries.",
                "what is api": "API (Application Programming Interface) is a set of rules for software to communicate. It defines what requests are allowed and what data is returned.",
                "what is cloud computing": "Cloud computing delivers computing services over the internet: servers, storage, databases, software. Providers include AWS, Azure, and Google Cloud.",
                "what is cybersecurity": "Cybersecurity protects computer systems and data from digital attacks using firewalls, encryption, authentication, and security protocols.",
                "what is quantum computing": "Quantum computers use quantum mechanics for computation, using qubits instead of bits. They're exponentially more powerful for certain problems.",
                "what is data science": "Data science combines statistics, programming, and domain knowledge to extract insights from data and build predictive models.",
                "what is big data": "Big data refers to massive datasets too large for traditional processing. It's analyzed to find patterns, correlations, and insights.",
                "how to learn programming": "Start with Python or JavaScript, practice daily on sites like Codecademy or freeCodeCamp, build projects, debug code, join communities, and keep learning!",
                "what is fiber optics": "Fiber optics transmits data as light through thin glass fibers. Advantages: high bandwidth, low signal loss, immunity to EMI, secure. Used in: internet backbones, CCTV, telecom. Types: single-mode (long distance), multi-mode (short distance).",
                "what is cctv": "CCTV is Closed-Circuit Television for video surveillance. Components: cameras, monitors, DVR/NVR. Types: analog, IP (network), wireless. Features: night vision, motion detection, remote viewing. Used for security and monitoring.",
                "what is security camera": "Security camera captures video for surveillance. Types: dome (indoor), bullet (outdoor), PTZ (movable), wireless. Features: 2MP-4K resolution, IR night vision, motion detection. Essential for home/business security.",
                "what is surveillance": "Surveillance monitors people or areas using CCTV, drones, or digital methods. Purpose: security, safety. Modern AI adds face recognition and behavior analysis.",
                "what is computer engineering": "Computer Engineering combines electrical and computer science. Designs computers, embedded systems, processors. Essential for technology hardware.",
                "what is chemical engineering": "Chemical Engineering applies chemistry to solve problems. Processes: manufacturing, fuels, pharmaceuticals. Essential for chemical industries.",
                "what is aerospace engineering": "Aerospace Engineering designs aircraft and spacecraft. Essential for aviation and space industry.",
                "what is biomedical engineering": "Biomedical Engineering applies engineering to medicine. Designs prosthetics, medical devices. Essential for healthcare technology.",
                "what is environmental engineering": "Environmental Engineering solves environmental problems. Areas: water treatment, air pollution. Essential for environmental protection.",
                "what is structural engineering": "Structural Engineering designs load-bearing structures. Essential for construction safety.",
                "what is html": "HTML (HyperText Markup Language) creates webpages using tags like <head>, <body>. Works with CSS (styling) and JavaScript (interactivity).",
                "what is css": "CSS (Cascading Style Sheets) styles webpages. Controls colors, fonts, layout. Flexbox and Grid for modern layouts.",
                "what is sql": "SQL manages relational databases. Commands: SELECT, INSERT, UPDATE, DELETE. Systems: MySQL, PostgreSQL.",
                "what is react": "React is JavaScript library for UI using components and virtual DOM. Popular for single-page apps.",
                "what is node": "Node.js is JavaScript runtime for servers. Great for APIs, chat, streaming. Express.js is popular.",
                "what is git": "Git is version control tracking code changes. GitHub hosts repositories. Essential for development.",
                "what is programming": "Programming writes instructions for computers. Languages: Python, JavaScript, Java, C++. Goal: solve problems.",
                "what is coding": "Coding writes computer programs. Involves syntax, logic, algorithms. Skills: problem-solving.",
                "what is development": "Development creates software. Types: web, mobile, desktop, embedded. Uses frameworks and tools.",
                "what is variable": "Variable stores data. Has name, type, value. Examples: let name='John'; let age=25.",
                "what is function": "Function is reusable code block. Enables organization and reusability.",
                "what is loop": "Loop repeats code. Types: for, while. Used for iteration.",
                "what is array": "Array is ordered list. Example: let fruits=['apple','banana']. Accessed by index.",
                "what is object": "Object stores key-value pairs. Example: let person={name:'John',age:30}.",
                "what is growth": "Growth is increase in size, quantity, or importance over time. Types: biological, economic, personal, technological. Measured by metrics like percentage increase. Essential for development.",
                "what is algorithm": "Algorithm solves problems step-by-step. Examples: sorting, searching. Foundation of computer science.",
                "what is database": "Database stores data. Types: relational (SQL), NoSQL. Essential for apps.",
                "what is server": "Server provides services. Types: web, database. Powers internet apps.",
                "what is cloud": "Cloud computing delivers services over internet. Providers: AWS, Azure, Google Cloud.",
                "what is docker": "Docker packages apps in containers. Essential for DevOps.",
                "what is api": "API is rules for software communication. REST APIs use HTTP methods.",
                "what is http": "HTTP is web protocol. Methods: GET, POST, PUT, DELETE. Foundation of web.",
                "what is json": "JSON is data format. Used for API responses. Example: {\"name\":\"John\"}",
                "what is frontend": "Frontend is user-facing part. Technologies: HTML, CSS, JavaScript, React.",
                "what is backend": "Backend is server-side. Languages: Python, Node.js, Java. Essential for app functionality.",
                "what is full stack": "Full stack covers frontend and backend. High demand. Builds complete apps.",
                "what is agile": "Agile is development methodology. Values: collaboration, working software. Frameworks: Scrum, Kanban.",
                "what is testing": "Testing verifies code works. Types: unit, integration, E2E. Essential for quality.",
                "what is deployment": "Deployment releases code. CI/CD automates the process.",
                "what is version control": "Version control tracks code changes. Git is standard. Enables collaboration.",
                "what is open source": "Open source is publicly available code. Examples: Linux, React, Python. Powers much of internet.",
                "what is typescript": "TypeScript adds types to JavaScript. Catches errors early. Used in enterprise apps.",
                "what is rust": "Rust is systems programming language. Focus: safety, performance. Memory-safe.",
                "what is go": "Go (Golang) is Google language. Fast. Used: Docker, Kubernetes.",
                "what is flutter": "Flutter builds cross-platform apps. Creates iOS, Android, web from one codebase.",
                "what is android": "Android is Google mobile OS. Apps: Java, Kotlin. Market: ~70%.",
                "what is ios": "iOS is Apple mobile OS. Apps: Swift, Objective-C.",
                "what is pwa": "PWA is Progressive Web App with native features. Works offline, push notifications.",
                "what is responsive": "Responsive design adapts to screen sizes using media queries.",
                "what is bootstrap": "Bootstrap is CSS framework. Provides components and grid. Speeds development.",
                "what is npm": "npm is Node package manager. Essential for JavaScript development.",
                "how to be productive": "Set clear goals, prioritize important tasks, minimize distractions, take breaks, stay organized, exercise, sleep well, and track progress regularly.",
                "how to learn fast": "Study actively, teach others what you learn, practice regularly, get good sleep, minimize distractions, use spaced repetition, and connect new ideas to existing knowledge.",
                "how to stay healthy": "Exercise regularly (150 min/week), eat balanced meals with fruits/vegetables, drink water, sleep 7-9 hours, manage stress, limit alcohol, and get checkups.",
                "what is success": "Success is achieving goals that matter to you. It's personal - could mean career achievement, happy relationships, good health, or helping others.",
                "what is happiness": "Happiness is well-being and contentment. It comes from meaningful relationships, personal growth, helping others, and living aligned with your values.",
                "what is love": "Love is affection and care for someone or something. It's emotional commitment that drives many human actions and relationships.",
                "what is ethics": "Ethics is the study of right and wrong conduct. It provides frameworks for moral decision-making considering consequences, virtues, and principles.",
                "tell me a joke": "Why do programmers prefer dark mode? Because light attracts bugs! 😄 Or: Why did the AI go to school? To improve its learning algorithms!",
                "tell me a fact": "The human brain uses about 20% of the body's energy despite being only 2% of body weight. That's why thinking is tiring!",
                
                // Football
                "what is football": "Football is a popular team sport played with an oval ball. There are two main types: American Football and Soccer (Association Football). American Football involves tactical plays and scoring touchdowns; Soccer emphasizes continuous play and goal scoring.",
                "football rules": "In American Football: Two teams of 11 players, 4 downs to advance the ball, touchdowns (6 pts), field goals (3 pts). In Soccer: 11 players per side, 90 minutes, score by kicking ball into goal. Both emphasize teamwork and strategy.",
                "football positions": "American Football: QB (quarterback), RB (running back), WR (receiver), OL (offensive line), DL (defensive line), LB (linebacker), DB (defensive back). Soccer: Goalkeeper, Defenders, Midfielders, Forwards/Strikers.",
                "how to play football": "Start with understanding basic rules. Practice ball control, passing, shooting. Join a team for organized play. Watch professional games to learn tactics. Practice regularly with dedicated training. Focus on fitness, technique, and teamwork!",
                "best football players": "All-time greats: Pelé, Diego Maradona, Zinedine Zidane, Ronaldinho, Ronaldo. Modern stars: Cristiano Ronaldo, Lionel Messi, Neymar, Mbappé, Haaland. Each brings unique skills and revolutionized the game.",
                "football world cup": "The FIFA World Cup is held every 4 years. Countries compete for the global championship. Brazil (5 titles), Germany & Italy (4), France (2), Argentina (2), Uruguay & England (1 each). Next tournament in 2026!",
                "epl table": "Show Premier League table with top teams, standings, and points.",
                "epl": "EPL (English Premier League) is England's top association football league. 20 teams compete. Season: August-May. Founded: 1992 (renamed from First Division). Teams: Manchester City, Arsenal, Liverpool, Tottenham, Chelsea, etc. Global viewership: billions. Most competitive league. Current standings available.",
                "what is epl": "EPL is the English Premier League - England's top football division. 20 teams compete in 38 matches each. Season typically August-May. Most-watched football league globally. Features elite clubs and world-class players. Competitive and unpredictable outcomes.",
                "epl standings": "Show current Premier League standings with team positions, points, wins, losses, draws.",
                "epl fixtures": "Show upcoming Premier League matches, dates, times, and current matchday.",
                "epl news": "Premier League updates, team news, player transfers, and match results. Check official Premier League website for latest news.",
                
                // Growth & Development
                "what is growth": "Growth is increase in size, quantity, or importance over time. Types: biological (living things), economic (GDP, business), personal (skills, knowledge), technological (innovation), population (demographic). Measured by metrics like percentage increase or absolute change. Positive indicator of development.",
                "personal growth": "Personal growth is self-improvement through developing skills, knowledge, and character. Methods: learning new skills, reading, courses, mentorship, practice, reflection, overcoming challenges. Benefits: confidence, opportunities, happiness, resilience. Continuous lifelong process. Focus: becoming better version of yourself.",
                "business growth": "Business growth is expansion of revenue, market share, or operations. Strategies: product innovation, market expansion, acquisitions, efficiency. Metrics: revenue increase, customer growth, employee count. Sustainable growth: balanced with profitability. Challenges: market competition, scaling operations.",
                "economic growth": "Economic growth is increase in GDP/output over time. Measured: annual percentage change. Driven by: productivity, innovation, capital investment, labor. Positive growth: more jobs, higher wages. Gdp per capita reflects standard of living. Global disparities: developed vs developing nations.",
                "population growth": "Population growth is increase in number of people. Factors: birth rate, death rate, migration. Exponential growth: populations double. Carrying capacity: resources limit growth. Demographics: age structure, urbanization. Challenges: sustainability, resources, education. Trends: slowing in developed, increasing in developing nations.",
                "what is development": "Development is progress toward better conditions. Types: human (health, education, income), economic (infrastructure, industry), social (equality, rights), environmental (sustainability). Reflects improvement in quality of life. Measured: HDI, GDP, literacy rates. Goal: sustainable development for all.",
                "how to achieve growth": "1) Set clear goals 2) Continuous learning 3) Take action consistently 4) Track progress 5) Adapt strategies 6) Seek feedback 7) Build upon wins 8) Stay motivated 9) Be patient (growth takes time) 10) Invest in yourself.",
                "growth mindset": "Growth mindset: belief that abilities can be developed through effort. Developed by: Carol Dweck. vs Fixed mindset (abilities fixed). Leads to: resilience, learning, achievement. Embraces challenges, learns from failure, sees effort as path to mastery. Key to success in personal/professional life.",
                "growth hacking": "Growth hacking is rapid experimentation to achieve rapid business growth. Focuses: cost-effective, creative strategies. Tactics: viral marketing, A/B testing, user acquisition, retention. Used by: startups, tech companies. Goals: exponential growth with limited resources. Metrics: acquisition, activation, retention, revenue.",
                
                // Engineering
                "what is engineering": "Engineering applies science and mathematics to solve practical problems. Types include: Civil (structures), Mechanical (machines), Electrical (power), Chemical (processes), Software (programs), Aerospace (aircraft), and more!",
                "civil engineering": "Civil Engineering designs and builds infrastructure: roads, bridges, buildings, dams, tunnels. It involves structural analysis, materials science, and project management. Civil engineers solve problems affecting communities and societies.",
                "mechanical engineering": "Mechanical Engineering involves designing machines, engines, turbines, and mechanical systems. It applies physics and materials science to create functional devices. Includes thermodynamics, dynamics, and vibration analysis.",
                "electrical engineering": "Electrical Engineering deals with electricity, electronics, and electromagnetism. Applications include power generation, distribution, motors, circuits, telecommunications, and renewable energy systems.",
                "software engineering": "Software Engineering is systematic development of software systems. It involves: planning, design, coding, testing, debugging, deployment. Focuses on quality, efficiency, and user experience. Languages: Python, Java, C++, JavaScript.",
                "how to become engineer": "Get a degree in your engineering field (3-4 years). Do internships during studies. Build real projects. Learn CAD software. Get professional certifications. Join engineering societies. Start entry-level job. Continuous learning is essential!",
                "engineering career": "Engineering careers offer high salaries and growth. Average engineer salary: $60-120k+. Specializations pay more. Opportunities in tech companies, construction, aerospace, automotive, energy, infrastructure. Demand is always high!",
                
                // Job Quotes & Career
                "job quotes": "\"Choose a job you love, and you'll never work a day in your life.\" - Confucius | \"Don't watch the clock; do what it does. Keep going.\" - Sam Levenson | \"Success is not final, failure is not fatal.\" - Churchill",
                "career quotes": "\"The future depends on what you do today.\" - Gandhi | \"Your work is going to fill a large part of your life.\" - Steve Jobs | \"Do what you can, with what you have, where you are.\" - Theodore Roosevelt",
                "motivation quotes": "\"Believe you can and you're halfway there.\" - Theodore Roosevelt | \"Success is 1% inspiration and 99% perspiration.\" - Edison | \"The only way to do great work is to love what you do.\" - Jobs",
                "leadership quotes": "\"A leader takes people where they want to go. A great leader takes people where they don't necessarily want to go, but ought to be.\" - Reagan | \"Leadership is about making others better.\" - Jobs",
                "success quotes": "\"Success is walking from failure to failure with no loss of enthusiasm.\" - Churchill | \"It does not matter how slowly you go as long as you do not stop.\" - Confucius",
                "entrepreneurship": "\"The best time to plant a tree was 20 years ago. The second best time is now.\" - Chinese Proverb | \"Entrepreneurship is living a few years of your life like most people won't, so that you can spend the rest of your life like most people can't.\"",
                
                // Science & Nature
                "what is photosynthesis": "Photosynthesis is the process where plants use sunlight, water, and CO2 to create glucose (sugar) and oxygen. It happens in chloroplasts containing chlorophyll. This is how plants produce food and oxygen for life on Earth.",
                "what is gravity": "Gravity is the force that attracts objects with mass toward each other. Earth's gravity pulls objects downward (9.8 m/s²). Larger objects have stronger gravitational pull. It governs planetary orbits and keeps us grounded.",
                "what is evolution": "Evolution is the process of biological change over time. Organisms with advantageous traits survive and reproduce more, passing genes to offspring. Over millions of years, small changes accumulate into new species. Evidence: fossils, DNA, observations.",
                "what is dna": "DNA (deoxyribonucleic acid) is the molecule carrying genetic instructions for life. It's a double helix with four bases: A, T, G, C. DNA is found in cell nuclei and organelles. It replicates to pass traits to offspring.",
                "what is atom": "An atom is the smallest unit of an element. It has a nucleus (protons + neutrons) orbited by electrons. Atomic number = proton count. Atoms bond to form molecules and compounds.",
                "what is periodic table": "The periodic table organizes 118 chemical elements by atomic number and properties. Rows are periods; columns are groups with similar properties. It helps predict element behavior and reactivity.",
                "what is photon": "A photon is a particle of light and electromagnetic radiation. It has no mass but carries energy. Speed is always 3×10⁸ m/s. Electrons absorb/emit photons when changing energy levels.",
                "what is quantum mechanics": "Quantum mechanics studies behavior of matter/energy at atomic/subatomic scales. Principles: uncertainty principle, wave-particle duality, quantized energy. It differs from classical physics and enables modern technology.",
                "what is relativity": "Einstein's theory of relativity has two parts: Special (1905) - time/space are relative, nothing exceeds light speed. General (1915) - gravity is curved spacetime. This revolutionized physics understanding.",
                "what is temperature": "Temperature measures average kinetic energy of molecules. Scales: Celsius (0-100 for water freezing-boiling), Fahrenheit, Kelvin (absolute, starts at -273.15°C). Higher temp = faster molecular motion.",
                "what is density": "Density is mass per unit volume (g/cm³ or kg/m³). Formula: Density = Mass / Volume. Water's density is 1 g/cm³ (standard). Materials with higher density are heavier for same volume.",
                "what is pressure": "Pressure is force per unit area (Pascals). Formula: Pressure = Force / Area. Atmospheric pressure at sea level: 101,325 Pa. Pressure increases with depth (water, air).",
                "what is sound": "Sound is mechanical waves traveling through matter (air, water, solid). It needs a medium to propagate at different speeds. Speed in air: 343 m/s. Pitch = frequency; loudness = amplitude.",
                "what is light": "Light is electromagnetic radiation visible to humans (wavelengths 380-700 nm). It travels at 3×10⁸ m/s in vacuum. Properties: wave-particle duality, refraction, reflection, diffraction.",
                "what is black hole": "A black hole is a region with gravity so strong nothing escapes, not even light. It forms from collapsed massive stars. Event horizon is the boundary of no return. Hawking radiation allows slow evaporation.",
                "what is star": "A star is a massive luminous sphere of plasma held together by gravity. It produces energy via nuclear fusion in its core, converting hydrogen to helium. Stars vary in size, temperature, and lifespan.",
                "what is planet": "A planet is a large celestial body orbiting a star that clears its orbital path. Earth is the 3rd planet from sun; 8 total in our solar system. Characteristics: round, orbits star, not a moon or comet.",
                "what is meteorite": "A meteorite is a meteoroid (space rock) that survives atmospheric entry and reaches Earth's surface. They provide samples of asteroids, moons, and planets. Some contain organic compounds and rare metals.",
                
                // History & Geography
                "world population": "Current world population: ~8.1 billion (2024). Largest countries: China, India, USA, Indonesia, Pakistan. Population roughly doubled since 1970. Growth rate: ~0.9%/year, declining in developed nations.",
                "what is geography": "Geography is the study of Earth's features, climates, populations, and cultures. Physical geography: landforms, weather, ecosystems. Human geography: cities, politics, economy. It connects natural and social sciences.",
                "earth layers": "Earth has layers from outside-in: Crust (solid rock, 35 km avg), Mantle (hot rock, 2,900 km), Outer Core (liquid iron), Inner Core (solid iron, 6,371 km total radius). Temperature increases with depth.",
                "what are tectonic plates": "Tectonic plates are large pieces of Earth's crust/upper mantle that move slowly. 7 major plates + many minor ones. They interact at boundaries causing earthquakes, volcanic eruptions, mountain formation, and trenches.",
                "what is volcano": "A volcano is an opening where molten rock (magma → lava when erupted) emerges from Earth's interior. Types: shield, cinder cone, composite. Volcanoes release heat, gases, and shape terrain.",
                "what is earthquake": "An earthquake is sudden ground shaking caused by tectonic plate movement, volcanic activity, or explosions. Measured by magnitude (Richter scale, 1-9+) and intensity. Epicenter is surface location above focus.",
                "what is tsunami": "A tsunami is a large ocean wave usually caused by underwater earthquakes, landslides, or volcanoes. Waves can be 29+ meters high. They travel across oceans at 500+ km/h and cause coastal destruction.",
                "what is climate change": "Climate change refers to long-term shifts in global temperatures and weather patterns. Primary cause: greenhouse gases (CO2, methane) from human activity (fossil fuels, deforestation). Effects: warming, sea-level rise, extreme weather.",
                "what is greenhouse effect": "The greenhouse effect is when atmospheric gases trap heat from the sun. Natural: essential for life; Enhanced: human CO2/methane increases heat trapping, causing global warming. Like a blanket keeping Earth warmer.",
                "what is acid rain": "Acid rain is precipitation with pH below 5.6 due to sulfur/nitrogen oxides from fossil fuels. It damages forests, aquatic life, buildings, crops. Caused by coal/oil burning in power plants, vehicles. Prevention: emission reductions.",
                "what is biome": "A biome is a large geographic region with specific climate, flora, fauna. Examples: tropical rainforest (warm, wet), desert (dry), tundra (cold), grassland, temperate forest, marine. Each has unique characteristics.",
                "ancient rome": "Ancient Rome (753 BC - 476 AD) was a civilization that became an empire. Republic (509-27 BC) had democracy, Senate. Empire (27 BC - 476 AD) under Caesar. Legacy: law, architecture, Christianity, Latin language, engineering.",
                "ancient greece": "Ancient Greece (800-146 BC) invented democracy, philosophy, olympics. City-states: Athens, Sparta. Philosophers: Socrates, Plato, Aristotle. Contributions: geometry, logic, plays, architecture. Conquered by Rome.",
                "what is world war 2": "WWII (1939-1945) was a global conflict between Axis (Germany, Japan, Italy) and Allies (USA, USSR, UK). Caused by WWII aftermath, fascism, Japan's expansion. Holocaust killed 6 million Jews. 70+ million dead total. Ended with atomic bombs.",
                "what is renaissance": "The Renaissance (14th-17th century) was a European cultural revival emphasizing humanism, art, science. Started in Italy. Key figures: Leonardo, Michelangelo, Gutenberg. Bridged medieval to modern periods. Promoted innovation and classical learning.",
                
                // Animals
                "what is animal": "An animal is a living organism that's multicellular, eats organic matter, moves voluntarily. Kingdom: Animalia. Has DNA, cells with nucleus (eukaryotic). Ranges from simple (sponges) to complex (humans). Most reproduce sexually.",
                "what is mammal": "Mammals are vertebrates with hair/fur, warm blood, most produce milk for offspring. Examples: humans, dogs, whales, bats. Characteristics: four-chambered heart, live birth (except monotremes), diaphragm for breathing.",
                "what is bird": "Birds are feathered, warm-blooded vertebrates. Most fly; some are flightless (penguin, ostrich). Lay eggs, have beaks, lightweight hollow bones. Strong vision. Descendants of dinosaurs. ~10,000 species exist.",
                "what is fish": "Fish are aquatic vertebrates with gills, fins, scales. Cold-blooded. Types: jawless (lampreys), cartilaginous (sharks), bony (most). Live in oceans, rivers, lakes. Most reproduce by external fertilization. Oldest vertebrates.",
                "what is insect": "Insects are small arthropods with 6 legs, three body parts (head, thorax, abdomen), often wings. Most numerous animals. Examples: ants, bees, butterflies, beetles. Most reproduce rapidly. Adapt to many environments.",
                "what is dinosaur": "Dinosaurs were large reptiles dominating Earth 229-66 million years ago. Ranged from small (chicken-size) to huge (100+ tons). Went extinct 66 million years ago (asteroid impact). Birds are considered modern dinosaurs.",
                "what is extinct": "Extinct means a species no longer exists; all individuals are dead. Causes: habitat loss, climate change, overhunting, competition. Recent: Dodo, Tasmanian Tiger. Currently endangered: panda, rhino, sea turtle.",
                
                // Human Body & Health
                "what is human body": "The human body has ~200 bones, 600+ muscles, 79 organs, 10 trillion cells. Systems: skeletal, muscular, nervous, circulatory, respiratory, digestive. Average weight: 70kg; height: 1.7m. Lives 70-80 years typically.",
                "what is heart": "The heart is a muscular organ pumping blood. 4 chambers: 2 atria, 2 ventricles. Pumps ~5L blood/minute. Controlled by electrical impulses. Resting rate: 60-100 beats/minute. Coronary arteries supply oxygen to heart muscle.",
                "what is lung": "Lungs are organs for gas exchange (oxygen in, CO2 out). Two in chest. Contain ~290 million alveoli where exchange happens. Controlled by diaphragm. Adults breathe ~20,000 times daily. Hold ~6L air when full.",
                "what is brain": "The brain is the central control organ (~1.4kg, 86 billion neurons). Parts: cerebrum (thought, movement), cerebellum (balance, coordination), brainstem (breathing, heart rate). Uses 20% body's energy. Divided into two hemispheres.",
                "what is bone": "Bones are hard organs made of calcium phosphate, collagen fibers. Store minerals, produce blood cells in marrow. Provide structure, protect organs. Strongest in compression; vertebrae bear weight. Remodel constantly throughout life.",
                "what is muscle": "Muscles are tissues that contract to produce movement. Types: skeletal (voluntary), smooth (organs), cardiac (heart). Powered by ATP energy. Require calcium, oxygen. ~40% of body weight in adults. Strongest: masseter (jaw).",
                "what is immunity": "The immune system protects against pathogens (viruses, bacteria). Has innate (immediate, non-specific) and adaptive (specific, memory) responses. White blood cells: neutrophils, lymphocytes, macrophages. Antibodies neutralize threats.",
                "what is disease": "A disease is abnormal body condition causing dysfunction, suffering, or death. Types: genetic (inherited), infectious (microbes), chronic (diabetes, cancer), degenerative. Prevention: hygiene, vaccination, healthy lifestyle.",
                "what is cancer": "Cancer is uncontrolled cell growth forming tumors. Caused by DNA mutations (smoking, UV, viruses, age). Spreads through metastasis. Types: carcinoma, sarcoma, leukemia. Treatment: surgery, chemotherapy, radiation. Early detection improves survival.",
                "what is diabetes": "Diabetes is high blood glucose (sugar). Type 1: pancreas can't produce insulin. Type 2: cells resist insulin. Symptoms: thirst, fatigue, frequent urination. Risk: obesity, age, genetics. Management: diet, exercise, medication.",
                "what is vitamin": "Vitamins are organic compounds needed for health. Water-soluble: B, C (expelled daily). Fat-soluble: A, D, E, K (stored). Deficiency causes disease (scurvy=C, rickets=D). Found in food naturally or fortified.",
                "what is calorie": "A calorie measures food energy. 1 kilocalorie (kcal) = 1000 calories. Daily needs: 2000 kcal average. Carbs/proteins: 4 cal/gram. Fat: 9 cal/gram. Surplus = weight gain; deficit = weight loss.",
                "what is exercise": "Exercise is physical activity improving fitness. Cardio (heart, 150 min/week recommended), strength (2x/week), flexibility, balance. Benefits: weight control, disease prevention, mental health, strength, endurance. Best done regularly.",
                
                // Sports
                "what is basketball": "Basketball is a team sport (5v5) with a ball, hoop 10 feet high. Score by shooting ball through hoop (2, 3-pointer). 4 quarters of 12 minutes (NBA). Combines speed, skill, strategy. Founded 1891 by James Naismith.",
                "what is tennis": "Tennis is racket sport played 1v1 (singles) or 2v2 (doubles). Ball bounces on court; opponents hit across net. Scoring: 0 (love), 15, 29, 40, game. Best of 3/5 sets in tournaments. Courts: grass, clay, hard.",
                "what is soccer": "Soccer (Association Football) is played 11v11. Score by kicking ball into goal. 90 minutes (2×45 min). Offside rule prevents unfair play. Governed by FIFA. Most popular sport globally. World Cup every 4 years.",
                "what is volleyball": "Volleyball is 6v6 team sport with net. Hit ball over net; opponent catches/returns. Ball mustn't touch ground. Scoring: rally scoring (every play counts). Sets: best of 3 or 5. Court: 18×9m. No catching allowed.",
                "what is boxing": "Boxing is 1v1 combat sport using fists. Wear gloves, hit opponents' upper body. Rounds: 12 minutes (pro), 3 minutes (amateur). Scoring: punches landed, knockdown = 10-8. Knockdown for 10 seconds = knockout. Governed by strict rules.",
                "what is swimming": "Swimming is moving through water using strokes. Strokes: freestyle (crawl), backstroke, breaststroke, butterfly. Racing distances: 50m-1500m. Olympic sport. Improves cardio, low-impact exercise. Can be competitive or recreational.",
                "what is golf": "Golf is played on course with 18 holes. Hit ball from tee into hole using fewest strokes. Par = standard strokes (birdie 1 under, bogey 1 over). Scoring: lower is better. Equipment: clubs (14 max), ball, tee.",
                
                // Technology & Internet
                "what is internet": "The Internet is a global system of interconnected computers (networks). Based on TCP/IP protocol. Enables data transfer worldwide. Started 1969 (ARPANET). Now 5+ billion users. Infrastructure: cables, servers, wireless networks.",
                "what is website": "A website is collection of webpages linked together on internet. Hosted on server. Accessed via URL using browser. Contains text, images, videos, links. Built with HTML, CSS, JavaScript. Domain name identifies website.",
                "what is browser": "A browser is software displaying webpages. Examples: Chrome, Firefox, Safari, Edge. Requests HTML from servers, renders it. Features: tabs, history, bookmarks, downloaded files, extensions. Major browsers: Chrome (65%), Safari (20%), Firefox (3%).",
                "what is algorithm": "An algorithm is step-by-step procedure solving a problem. Used in programming, math, data. Characteristics: finite, well-defined, produces output. Examples: sorting (quick, merge), searching (binary). Efficiency: time/space complexity.",
                "what is database": "A database is organized data collection. Types: relational (tables), NoSQL (documents). Managed by DBMS. Accessed via queries. Features: ACID properties (reliability), indexing (speed). Common: MySQL, PostgreSQL, MongoDB.",
                "what is cybersecurity": "Cybersecurity protects systems/data from attacks. Tools: firewalls, encryption, authentication, VPN. Threats: malware, phishing, ransomware, DDoS. Best practice: strong passwords, updates, backups. Careers: ethical hacker, analyst, engineer.",
                "what is encryption": "Encryption converts readable data (plaintext) to unreadable (ciphertext) using key/algorithm. Symmetric: same key encrypt/decrypt. Asymmetric: public/private keys. Applications: passwords, credit cards, messages. AES-256 is standard.",
                "what is vpn": "VPN (Virtual Private Network) encrypts internet traffic through secure tunnel. Hides IP address, location, ISP. Benefits: privacy, security, access restricted content. Works via remote server. Slower than direct connection.",
                "what is firewall": "A firewall is network security system monitoring/controlling traffic. Types: hardware (network device), software (computer program). Blocks unauthorized access/malware. Rules: allow/deny based on source/destination. First line of defense.",
                "what is malware": "Malware is malicious software damaging computers. Types: virus (replicates), worm (spreads), trojan (disguised), ransomware (encrypts files), spyware (steals data), adware (unwanted ads). Prevention: antivirus, safe browsing, updates.",
                
              
                // Universe & Space
                "what is solar system": "Our solar system has the Sun (center) with 8 planets, 5 dwarf planets, moons, asteroids, comets. Formed 4.6 billion years ago. Planets: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune. Light-year away from galactic edge.",
                "what is galaxy": "A galaxy is system of billions of stars, gas, dust held by gravity. Types: spiral (arms), elliptical (round), irregular. Milky Way contains 200-400 billion stars. Andromeda is nearest major galaxy (~2.5 million light-years).",
                "what is universe": "The universe is everything: galaxies, stars, planets, light, time, space. Age: 13.8 billion years (Big Bang). Expanding continuously (accelerating). Diameter: 93 billion light-years. Mostly dark matter/energy (~95%).",
                "what is big bang": "The Big Bang is origin event of universe ~13.8 billion years ago. All matter, energy, space-time emerged from extreme density. Expanded and cooled. Evidence: cosmic microwave background radiation, galaxies' recession. Still expanding today.",
                "what is light year": "A light-year is distance light travels in 1 year: ~9.46 trillion km. Used measuring cosmic distances. Sun is 8 light-minutes away. Nearest star: 4.37 light-years. Observable universe: 46.5 billion light-years radius.",
                "what is asteroid": "Asteroids are rocky objects orbiting Sun, mostly between Mars-Jupiter. Sizes: dust to 600 km diameter. Made of metals, silicates. Formed from leftover material from solar system creation. Collisions create meteorites reaching Earth.",
                "what is comet": "Comets are icy bodies from outer solar system. Orbit Sun, often elliptical. Develop tails when approaching Sun (ice sublimes). Famous: Halley's (every 76 years). Tails point away from Sun due to solar wind.",
                
                // Literature & Arts
                "what is literature": "Literature is written artistic expression: novels, poems, plays, essays. Conveys ideas, emotions, experiences. Genres: fiction, non-fiction, drama, poetry. Elements: plot, character, theme, setting. Preserves culture and ideas across generations.",
                "what is poetry": "Poetry is literary form using rhythm, rhyme, imagery. Types: sonnet (14 lines), haiku (5-7-5 syllables), free verse (no structure). Devices: metaphor, simile, alliteration. Purpose: express emotion, convey beauty, provoke thought.",
                "what is novel": "A novel is long fictional narrative prose. Has plot, characters, setting, conflict. Genres: romance, mystery, sci-fi, fantasy, historical. Long enough to develop complex stories (typically 50,000+ words). Different from short story.",
                "what is drama": "Drama is literature meant for performance (plays). Elements: characters, dialogue, action, conflict. Genres: tragedy (sad ending), comedy (happy), tragicomedy. Performed on stage with actors, sets, props, lights.",
                "what is art": "Art is creative expression using visual medium: painting, sculpture, photography, drawing. Elements: color, line, shape, texture, form. Genres: portrait, landscape, abstract, surrealism. Communicates ideas, emotions, cultural values.",
                "what is painting": "Painting is applying pigment to surface (canvas, paper, wall) using brush, knife. Mediums: oil, acrylic, watercolor. Styles: realism, impressionism, cubism, abstract. Famous painters: Da Vinci, Van Gogh, Picasso, Frida Kahlo.",
                "what is sculpture": "Sculpture is 3D art creating forms from materials (stone, metal, wood, clay). Techniques: carving (subtractive), casting, welding. Famous sculptors: Michelangelo, Rodin, Henry Moore. Purpose: represent, beautify, provoke thought.",
                
                // Philosophy & Religion
                "what is philosophy": "Philosophy is systematic study of fundamental questions about reality, knowledge, ethics, existence. Methods: questioning, reasoning, debate. Branches: metaphysics, epistemology, ethics, logic. Encourages critical thinking and wisdom.",
                "what is ethics": "Ethics is study of right/wrong conduct and moral principles. Frameworks: utilitarianism (maximize happiness), deontology (duties), virtue ethics (character). Addresses: honesty, fairness, justice, virtue. Guide moral decision-making.",
                "what is religion": "Religion is belief system about divine/sacred, often with God(s), rituals, moral codes. Major religions: Christianity, Islam, Hinduism, Buddhism, Judaism. Serves: community, meaning, morality, comfort. ~85% world population religious.",
                "what is christianity": "Christianity believes Jesus Christ is savior of humanity. Founded ~33 AD. Holy book: Bible. Branches: Catholic, Protestant, Orthodox. Central beliefs: God loves humanity, Christ's resurrection, salvation through faith. 2+ billion followers.",
                "what is islam": "Islam believes Muhammad is God's final prophet. Holy book: Quran. Founded 610 AD. Five Pillars: faith, prayer, alms, fasting, pilgrimage. Believers worship Allah. Largest Muslim nation: Indonesia. ~1.9 billion followers.",
                "what is buddhism": "Buddhism teaches path to end suffering (dharma) through wisdom, meditation. Founded ~500 BC by Siddhartha (Buddha). No deity worship; self-improvement focus. Concepts: karma, nirvana, reincarnation. ~520 million followers.",
                "what is hinduism": "Hinduism is oldest major religion (~4000 years). Believes in deities (Brahma, Vishnu, Shiva), karma, reincarnation. Holy texts: Vedas. Pursuit: dharma (duty), moksha (liberation). ~1.2 billion followers, mostly India.",
                
                // Government & Politics
                "what is government": "Government is system ruling society, making laws, providing services. Types: democracy (people rule), autocracy (one ruler), oligarchy (few rule). Functions: legislation, execution, judiciary. Responsible for order, justice, welfare.",
                "what is democracy": "Democracy is government by people via voting. Direct (all vote on issues) or representative (vote for representatives). Features: free elections, rights, separation of powers. Checks corruption. Challenges: voter apathy, misinformation.",
                "what is president": "A president is head of state/government in republic. Elected by people (usually). Powers: veto laws, command military, appoint officials. Term: typically 4-5 years. Examples: US, France, Brazil presidents.",
                "what is parliament": "Parliament is legislative body making laws. Types: bicameral (two houses), unicameral (one). Examples: UK (House of Commons, Lords), India. Members debate, vote on bills. Represents people's interests.",
                "what is constitution": "Constitution is fundamental law governing state. Establishes government structure, rights, duties. Examples: US (1787), India (1950). Supreme; other laws must comply. Can be amended (usually requires consensus).",
                "what is bill of rights": "Bill of Rights is document protecting fundamental freedoms. US example (1791): freedom of speech, religion, press, assembly, petition, bear arms. Protects individuals from government overreach. Foundation of human rights.",
                "what is sovereignty": "Sovereignty is supreme power/authority of state over territory, people. Means independence from external control. International law recognizes state sovereignty. Limited by treaties, human rights. Basis of nation-states.",
                
                // Economics & Money
                "what is economy": "An economy is system of production, distribution, consumption of goods/services. Types: market (capitalism), planned (socialism), mixed. Measures: GDP, inflation, employment, trade. Goal: meet human needs, well-being.",
                "what is gdp": "GDP (Gross Domestic Product) is total value of goods/services produced in country yearly. Measures economy size. Largest: US, China, Japan. Per capita GDP = GDP/population (income measure). Growing GDP = economic growth.",
                "what is inflation": "Inflation is sustained rise in price level over time. Causes: increased money supply, demand > supply, taxes. Effects: purchasing power decreases, savings lose value. Measured by CPI (Consumer Price Index). Central banks control via interest rates.",
                "what is unemployment": "Unemployment is percentage of workforce without job seeking employment. Types: frictional (between jobs), structural (skill mismatch), cyclical (economic downturn). Affects: poverty, crime, health. Measured monthly by governments.",
                "what is stock": "A stock is share of company ownership. Buy = become shareholder, own fraction. Stock price varies with company performance. Buying low, selling high = profit. Dividends = share of profits. Stock market = where shares trade.",
                "what is bond": "A bond is debt security; investor loans money to borrower (company, government). Borrower pays interest (coupon) periodically, returns principal at maturity. Lower risk than stocks. Interest rates affect bond values.",
                "what is cryptocurrency": "Cryptocurrencies are digital money using cryptography. Bitcoin (first, 2009), Ethereum, others. Blockchain: distributed ledger, transparent, irreversible. Advantages: fast, low-cost, borderless. Challenges: volatility, regulation, security.",
                "what is tax": "Tax is compulsory payment to government. Types: income, sales, property, corporate. Purpose: public services (roads, schools, military), infrastructure. Progressive tax: higher earners pay more. Different rates by country.",
                "what is interest rate": "Interest rate is cost of borrowing money (loan) or return on savings. Expressed as percentage yearly. Central banks set base rates affecting economy. Higher rates: discourage borrowing, encourage saving. Controls inflation.",
                "what is trade": "Trade is exchange of goods/services between parties. Domestic (within country), international (between countries). Benefits: specialization, efficiency, variety. Issues: tariffs, imbalance, protectionism. Free trade vs protective.",
                
                // Culture & Society
                "what is culture": "Culture is shared beliefs, values, customs, behaviors of society/group. Includes: language, art, music, food, traditions, rituals. Varies by region, ethnicity, nationality. Transmitted generation to generation. Shapes identity.",
                "what is tradition": "Tradition is custom/practice passed through generations. Maintains cultural identity and values. Examples: holidays, rituals, food, clothing. Can evolve while preserving core meaning. Important for community cohesion.",
                "what is festival": "A festival is celebratory event, usually annual or periodic. Celebrates culture, religion, harvest, historical event. Examples: Christmas, Diwali, Carnival, Oktoberfest. Features: gatherings, food, music, decorations, spiritual significance.",
                "what is marriage": "Marriage is legal/social union between individuals. Customs vary culturally. Traditionally implied partnership, companionship, reproduction. Legal benefits: taxes, inheritance, property rights. Ceremonies: religious or civil.",
                "what is family": "A family is social group linked by blood, marriage, adoption. Types: nuclear (2 parents + children), extended (relatives), single-parent, blended. Purposes: child-rearing, emotional support, cultural transmission. Foundation of society.",
                "what is education": "Education is process acquiring knowledge, skills, values. Types: formal (schools), informal (experience), non-formal (training). Levels: primary, secondary, tertiary. Benefits: employment, opportunity, informed citizenship, personal growth.",
                "what is community": "Community is group sharing common interests, location, identity. Characteristics: social connections, shared values, cooperation. Provides: support, belonging, mutual aid. Types: geographic, online, interest-based.",
                
                // Natural Disasters
                "what is flood": "Flood is overflow of water on normally dry land. Causes: heavy rainfall, snowmelt, dam failure, storm surge. Damages buildings, crops, infrastructure. Risk areas: rivers, coasts, low-lying regions. Prevention: dams, levees, drainage.",
                "what is tornado": "Tornado is violent rotating column of air extending from thunderstorm. Wind speeds: 65-480+ km/h (Fujita scale). Forms in minutes; lasts minutes to hours. Damages path: 1-200 km wide. Occurs frequently in US, less Asia.",
                "what is hurricane": "Hurricane (Atlantic) / Typhoon (Pacific) / Cyclone (Indian) is tropical rotating storm. Wind speeds: 119+ km/h. Form over warm ocean water. Bring heavy rain, storm surge, flooding. Season: varies by region (summer-fall typical).",
                "what is drought": "Drought is prolonged water scarcity over region. Causes: low rainfall, high temperature, deforestation, overuse. Effects: crop failure, water shortage, food insecurity, economic loss. Can last months to years. Increasing with climate change.",
                
                // Psychology
                "what is psychology": "Psychology is study of mind and behavior. Branches: clinical (disorders), social (group behavior), cognitive (thinking), developmental (growth). Methods: observation, experiments, surveys. Helps understand human nature.",
                "what is emotion": "Emotion is physiological/psychological response to stimuli. Basic emotions: happiness, sadness, anger, fear, surprise, disgust. Accompanied by: facial expressions, body language, physiological changes. Influenced by: experience, culture, brain chemistry.",
                "what is stress": "Stress is physical/mental tension from demands. Sources: work, relationships, health, finances. Short-term: helpful (motivation); chronic: harmful (anxiety, depression, disease). Management: exercise, meditation, social support, professional help.",
                "what is motivation": "Motivation is driving force behind behavior. Types: intrinsic (internal satisfaction), extrinsic (external reward). Theories: Maslow's hierarchy (needs), self-determination (autonomy, competence). Higher motivation = persistence, achievement.",
                "what is learning": "Learning is acquiring knowledge/skills through experience, study, practice. Types: associative (stimulus-response), observational (watching), cognitive (understanding). Requires: attention, practice, repetition, feedback. Lifelong process.",
                
                // Food & Nutrition
                "what is protein": "Protein is macronutrient made of amino acids. Essential for: muscle growth, enzyme production, antibodies. Sources: meat, eggs, beans, nuts, grains. Daily need: 0.8-1g per kg body weight. 9 amino acids: essential (must eat).",
                "what is carbohydrate": "Carbohydrate is sugar/starch providing energy. Simple: glucose, fructose (quick energy). Complex: whole grains, vegetables (sustained energy). Provide 4 cal/gram. Needed for brain, exercise. Excess converts to fat storage.",
                "what is fat": "Fat is nutrient providing energy, hormone production, insulation. Types: saturated (solid, limit), unsaturated (better), trans (avoid). Provide 9 cal/gram (most). Sources: oils, nuts, fish, avocados. Essential in moderation.",
                "what is vegetarian": "Vegetarian avoids eating meat but eats eggs, dairy. Reasons: ethics, health, environment. Types: lacto-ovo (eggs+dairy), vegan (none). Requires: balanced proteins, B12, iron. Well-planned diet is healthy and nutritious.",
                "what is vegan": "Vegan avoids animal products: meat, eggs, dairy, honey. Reasons: animal rights, environment, health. Sources: beans, nuts, tofu, grains, vegetables. Requires: B12 supplement, varied diet. Growing lifestyle choice.",
                
                // Weather
                "what is weather": "Weather is short-term atmospheric condition: temperature, precipitation, wind, humidity. Changes daily. Forecast uses data from satellites, weather stations. Affects: activities, agriculture, transportation. Different from climate (long-term).",
                "what is thunderstorm": "Thunderstorm is severe weather with lightning, thunder, rain. Forms from cumulonimbus clouds. Lightning = electrical discharge (heat air, create sound). Risks: lighting strike, wind damage, hail, flooding. Avoid high places during storms.",
                "what is hail": "Hail is precipitation of ice pellets (6mm+). Forms in strong updrafts of thunderstorms. Frozen raindrops. Dangerous: damages crops, cars, buildings, roofs. Common: spring, summer in temperate regions. Larger hail = stronger storms.",
