<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXONA AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%22900000' rx='15'/><circle cx='50' cy='35' r='15' fill='white' opacity='0.9'/><circle cx='35' cy='50' r='8' fill='white' opacity='0.8'/><circle cx='65' cy='50' r='8' fill='white' opacity='0.8'/><circle cx='50' cy='65' r='10' fill='white' opacity='0.85'/><line x1='50' y1='50' x2='50' y2='60' stroke='white' stroke-width='1.5'/><line x1='42' y1='56' x2='35' y2='50' stroke='white' stroke-width='1.5'/><line x1='58' y1='56' x2='65' y2='50' stroke='white' stroke-width='1.5'/></svg>"
    >
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 700px;
            background: rgb(11, 166, 172);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(6, 255, 243, 0.863);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: rgb(11, 166, 172);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            animation: pulse-glow 2s ease-in-out infinite;
            position: relative;
            border: 3px solid white;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 12px 29px rgba(255, 255, 255, 0.4);
                transform: scale(1.05);
            }
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header-text h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: black;
            text-shadow: 0 0 10px rgba(11, 166, 172, 0.3);
        }

        .header-text p {
            margin: 0;
            font-size: 11px;
            opacity: 0.85;
            margin-top: 3px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0a0a0a;
        }
        
        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }
        
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        
        .message.ai {
            display: flex;
            justify-content: flex-start;
        }
        
        .message-content {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 75%;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: rgb(23, 221, 188);
            color: black;
        }
        
        .message.ai .message-content {
            background:rgb(10, 184, 175) ;
            color: black;
            border: 1px solid #e0e0e0;
        }
        
        .image-result {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-container {
            padding: 15px;
            background: rgb(5, 5, 5);
            border-top: 1px solid rgb(12, 12, 12);
            display: flex;
            gap: 10px;
        }
        
        #messageInput {
            flex: 1;
            border: 1px solid black;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #messageInput:focus {
            border-color: #000000;
        }
        
        #sendBtn {
            background: #000000;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        #sendBtn:hover {
            transform: scale(1.05);
        }
        
        #sendBtn:active {
            transform: scale(0.95);
        }

        #micBtn {
            background: #000000;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            font-size: 16px;
        }

        #micBtn:hover {
            transform: scale(1.05);
        }

        #micBtn.listening {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        #speakBtn {
            background: #000000;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            font-size: 16px;
        }

        #speakBtn:hover {
            transform: scale(1.05);
        }

        #speakBtn.speaking {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .language-selector {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-start;
            font-size: 12px;
        }

        .language-selector select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 12px;
        }
        
        .pidgin-indicator {
            background: #ffc107;
            color: black;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }
        
        .league-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 10px;
            background: white;
        }
        
        .league-table thead {
            background: #000000;
            color: white;
        }
        
        .league-table th {
            padding: 8px 4px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #000000;
        }
        
        .league-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #eee;
        }
        
        .league-table tr:hover {
            background: #f5f5f5;
        }
        
        .league-table .pos {
            font-weight: bold;
            width: 29px;
            text-align: center;
        }
        
        .league-table .team-name {
            font-weight: 500;
            flex-grow: 1;
        }
        
        .league-table .stat {
            text-align: center;
            width: 35px;
        }
        
        .league-title {
            font-weight: bold;
            color: #161616;
            margin-top: 12px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        /* Settings Button & Modal */
        .settings-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .settings-btn:hover {
            opacity: 0.8;
        }

        .settings-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .settings-modal.show {
            display: flex;
        }

        .settings-content {
            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .settings-content h2 {
            margin-top: 0;
            color: white;
        }

        .color-setting {
            margin-bottom: 20px;
        }

        .color-setting label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .color-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-input-group input[type="color"] {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .color-hex {
            flex: 1;
            padding: 8px;
            border: 1px solid #0e0d0d;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
        }

        .settings-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .settings-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .settings-buttons .reset-btn {
            background: black;
            color: white;
        }

        .settings-buttons .save-btn {
            background: black;
            color: white;
        }

        .settings-buttons button:hover {
            opacity: 0.9;
        }
        
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="logo">
                <svg viewBox="0 0 100 100" width="50" height="50" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
                    <!-- Brain/AI symbol -->
                    <circle cx="50" cy="35" r="15" fill="white" opacity="0.9"/>
                    <circle cx="35" cy="50" r="8" fill="white" opacity="0.8"/>
                    <circle cx="65" cy="50" r="8" fill="white" opacity="0.8"/>
                    <circle cx="50" cy="65" r="10" fill="white" opacity="0.85"/>
                    <!-- Connecting lines -->
                    <line x1="50" y1="50" x2="50" y2="60" stroke="white" stroke-width="1.5" opacity="0.7"/>
                    <line x1="42" y1="56" x2="35" y2="50" stroke="white" stroke-width="1.5" opacity="0.7"/>
                    <line x1="58" y1="56" x2="65" y2="50" stroke="white" stroke-width="1.5" opacity="0.7"/>
                </svg>

            <div class="header-text">

                    👋 Hello! I'm <strong>REXONA AI</strong> - your incredibly smart assistant!
                    <!-- <br><br>🧠 I can answer questions, solve problems, explain complex topics, help with homework, translate languages, show images, get sports updates, and much more!
                    <br><br>💬 Just ask me anything! -->
                </div>
            </div>
        </div>

        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message..." 
                autocomplete="off"
            >
            <button id="micBtn">🎤</button>
            <button id="speakBtn">🔊</button>
            <button id="sendBtn">Send</button>
            <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt" style="display: none;">
            <button id="fileBtn" onclick="document.getElementById('fileInput').click()">📎</button>
        </div>
        
        <!-- Quick Language Buttons -->
        <!-- <div class="quick-lang-container">
            <span class="quick-lang-label">🌐 Translate to:</span>
            <button class="quick-lang-btn" onclick="setOutputLanguage('es')" title="Spanish">🇪🇸 ES</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('fr')" title="French">🇫🇷 FR</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('de')" title="German">🇩🇪 DE</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('zh')" title="Chinese">🇨🇳 ZH</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('ja')" title="Japanese">🇯🇵 JA</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('ko')" title="Korean">🇰🇷 KO</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('pt')" title="Portuguese">🇧🇷 PT</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('pidgin')" title="Pidgin">🇳🇬 PID</button>
            <button class="quick-lang-btn" onclick="setOutputLanguage('en')" title="English">🇬🇧 EN</button>
        </div> -->
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="settings-modal">
        <div class="settings-content">
            <h2>⚙️ Settings</h2>
            
            <div class="color-setting">
                <label>User Message Color</label>
                <div class="color-input-group">
                    <input type="color" id="userMsgColor" value="#000000">
                    <input type="text" class="color-hex" id="userMsgColorHex" value="#000000" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>User Message Text Color</label>
                <div class="color-input-group">
                    <input type="color" id="userTextColor" value="#ffffff">
                    <input type="text" class="color-hex" id="userTextColorHex" value="#ffffff" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>AI Response Box Color</label>
                <div class="color-input-group">
                    <input type="color" id="aiBgColor" value="#ffffff">
                    <input type="text" class="color-hex" id="aiBgColorHex" value="#ffffff" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>AI Response Text Color</label>
                <div class="color-input-group">
                    <input type="color" id="aiTextColor" value="#333333">
                    <input type="text" class="color-hex" id="aiTextColorHex" value="#333333" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>Header/Button Color</label>
                <div class="color-input-group">
                    <input type="color" id="headerColor" value="#000000">
                    <input type="text" class="color-hex" id="headerColorHex" value="#000000" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>Input Language</label>
                <select id="inputLanguage" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px;">
                    <option value="en">English</option>
                    <option value="pidgin">Pidgin English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ja">Japanese</option>
                    <option value="zh">Chinese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="ru">Russian</option>
                    <option value="hi">Hindi</option>
                </select>
            </div>

            <div class="color-setting">
                <label>Output Language</label>
                <select id="outputLanguage" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px">
                    <option value="en">English</option>
                    <option value="pidgin">Pidgin English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ja">Japanese</option>
                    <option value="zh">Chinese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="ru">Russian</option>
                    <option value="hi">Hindi</option>
                </select>
            </div>

            <div class="settings-buttons">
                <button class="reset-btn" id="resetBtn">Reset to Default</button>
                <button class="save-btn" id="saveBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        const inputLanguageSelect = document.getElementById('inputLanguage');
        const outputLanguageSelect = document.getElementById('outputLanguage');
        
        // Settings Variables
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const colorInputs = {
            userMsgColor: document.getElementById('userMsgColor'),
            userTextColor: document.getElementById('userTextColor'),
            aiBgColor: document.getElementById('aiBgColor'),
            aiTextColor: document.getElementById('aiTextColor'),
            headerColor: document.getElementById('headerColor'),
        };

        // Load saved colors from localStorage
        function loadColors() {
            const saved = localStorage.getItem('rexonaColors');
            if (saved) {
                const colors = JSON.parse(saved);
                Object.keys(colors).forEach(key => {
                    if (colorInputs[key]) {
                        colorInputs[key].value = colors[key];
                        updateColorHex(key);
                        applyColor(key, colors[key]);
                    }
                });
            }
        }
        
        // ============================
        // FILE UPLOAD FOR ENHANCEMENT
        // ============================
        const fileInput = document.getElementById('fileInput');
        const fileBtn = document.getElementById('fileBtn');
        let uploadedFileContent = null;
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const fileName = file.name;
            const fileType = file.type;
            
            addMessage(`📎 File uploaded: ${fileName}`, true);
            addMessage("⏳ Processing your file...", false);
            
            try {
                let fileContent = '';
                
                if (fileType.startsWith('image/')) {
                    // For images, create a preview
                    const reader = new FileReader();
                    fileContent = await new Promise((resolve) => {
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                    uploadedFileContent = { type: 'image', data: fileContent, name: fileName };
                    addMessage(`🖼️ Image received! I can see an image file: ${fileName}. What would you like me to do with it? I can: describe it, enhance it, extract text (OCR), or analyze it.`, false, true);
                } 
                else if (fileType === 'text/plain' || fileType === 'application/pdf' || fileType.includes('document')) {
                    // For text files
                    if (fileType === 'text/plain') {
                        fileContent = await file.text();
                    } else {
                        fileContent = `[${fileType} file uploaded - ${fileName}]. I can analyze and help improve documents, PDFs, and text files. What would you like me to do with this?`;
                    }
                    uploadedFileContent = { type: 'document', data: fileContent, name: fileName };
                    addMessage(`📄 Document received: ${fileName}. I can analyze this content and help enhance it. What would you like me to do?`, false, true);
                }
                else {
                    addMessage(`📎 File received: ${fileName}. Please tell me what you'd like me to do with this file - I can help analyze, summarize, improve, or enhance it!`, false, true);
                }
            } catch (error) {
                addMessage(`⚠️ Error processing file: ${error.message}`, false);
            }
        });

        // Update hex text when color picker changes
        function updateColorHex(inputId) {
            const hexId = inputId + 'Hex';
            const hexInput = document.getElementById(hexId);
            if (hexInput) {
                hexInput.value = colorInputs[inputId].value.toUpperCase();
            }
        }

        // Apply color changes to the UI
        function applyColor(colorKey, colorValue) {
            switch(colorKey) {
                case 'userMsgColor':
                    document.documentElement.style.setProperty('--user-msg-bg', colorValue);
                    const style = document.createElement('style');
                    style.textContent = `.message.user .message-content { background: ${colorValue} !important; }`;
                    if (!document.getElementById('userMsgStyle')) {
                        style.id = 'userMsgStyle';
                        document.head.appendChild(style);
                    } else {
                        document.getElementById('userMsgStyle').textContent = `.message.user .message-content { background: ${colorValue} !important; }`;
                    }
                    break;
                case 'userTextColor':
                    const userTextStyle = document.createElement('style');
                    userTextStyle.textContent = `.message.user .message-content { color: ${colorValue} !important; }`;
                    if (!document.getElementById('userTextStyle')) {
                        userTextStyle.id = 'userTextStyle';
                        document.head.appendChild(userTextStyle);
                    } else {
                        document.getElementById('userTextStyle').textContent = `.message.user .message-content { color: ${colorValue} !important; }`;
                    }
                    break;
                case 'aiBgColor':
                    const aiBgStyle = document.createElement('style');
                    aiBgStyle.textContent = `.message.ai .message-content { background: ${colorValue} !important; }`;
                    if (!document.getElementById('aiBgStyle')) {
                        aiBgStyle.id = 'aiBgStyle';
                        document.head.appendChild(aiBgStyle);
                    } else {
                        document.getElementById('aiBgStyle').textContent = `.message.ai .message-content { background: ${colorValue} !important; }`;
                    }
                    break;
                case 'aiTextColor':
                    const aiTextStyle = document.createElement('style');
                    aiTextStyle.textContent = `.message.ai .message-content { color: ${colorValue} !important; }`;
                    if (!document.getElementById('aiTextStyle')) {
                        aiTextStyle.id = 'aiTextStyle';
                        document.head.appendChild(aiTextStyle);
                    } else {
                        document.getElementById('aiTextStyle').textContent = `.message.ai .message-content { color: ${colorValue} !important; }`;
                    }
                    break;
                case 'headerColor':
                    const headerStyle = document.createElement('style');
                    headerStyle.textContent = `.chat-header, #sendBtn, #micBtn { background: ${colorValue} !important; }`;
                    if (!document.getElementById('headerStyle')) {
                        headerStyle.id = 'headerStyle';
                        document.head.appendChild(headerStyle);
                    } else {
                        document.getElementById('headerStyle').textContent = `.chat-header, #sendBtn, #micBtn { background: ${colorValue} !important; }`;
                    }
                    break;
            }
        }

        // Settings Button Click Handlers
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('show');
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('show');
            }
        });

        Object.keys(colorInputs).forEach(key => {
            colorInputs[key].addEventListener('change', () => {
                updateColorHex(key);
                applyColor(key, colorInputs[key].value);
            });
            colorInputs[key].addEventListener('input', () => {
                updateColorHex(key);
            });
        });

        saveBtn.addEventListener('click', () => {
            const colors = {};
            Object.keys(colorInputs).forEach(key => {
                colors[key] = colorInputs[key].value;
            });
            localStorage.setItem('rexonaColors', JSON.stringify(colors));
            settingsModal.classList.remove('show');
        });

        resetBtn.addEventListener('click', () => {
            localStorage.removeItem('rexonaColors');
            location.reload();
        });

        // Load colors on page load
        loadColors();
        
        // ============================
        // TEXT-TO-SPEECH (DICTATE)
        // ============================
        let isSpeaking = false;
        let speechSynthesis = window.speechSynthesis || window.webkitSpeechSynthesis;
        let currentSpeakingText = '';
        
        function speakText(text) {
            if (!speechSynthesis) {
                alert('Sorry, your browser does not support text-to-speech!');
                return;
            }

            }
            
            // Strip HTML tags for speech
            const plainText = text.replace(/<[^>]*>/g, '').replace(/\*\*/g, '');
            currentSpeakingText = plainText;
            
            const utterance = new SpeechSynthesisUtterance(plainText);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            // Try to get a good English voice
            const voices = speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
            if (englishVoice) {
                utterance.voice = englishVoice;
            }

                speakBtn.classList.remove('speaking');

            };
            
            utterance.onerror = () => {
                isSpeaking = false;
                speakBtn.classList.remove('speaking');
                speakBtn.textContent = '🔊';
            };
            
            speechSynthesis.speak(utterance);
        }

                'very ': 'well ',

                'quite ': 'small ',
                'just ': 'just ',
                'only ': 'only ',
                'also ': 'also ',
                'too ': 'too ',
            };

            let result = text.toLowerCase();
            
            // Sort by length (longest first) to avoid partial replacements
            const sortedKeys = Object.keys(pidginMap).sort((a, b) => b.length - a.length);
            
            for (const key of sortedKeys) {
                const regex = new RegExp('\\b' + key + '\\b', 'gi');
                result = result.replace(regex, pidginMap[key]);
            }
            
            // Add Pidgin flavor - add "o", "jare", "eh" at end of sentences
            result = result.replace(/([.!?])/g, (match) => {
                if (Math.random() > 0.4) {
                    return ' o' + match;

                return match;

            // Add "na" emphasis at beginning sometimes
            const sentences = result.split(/([.!?])/);
            result = sentences.map((sentence, i) => {
                if (i % 2 === 0 && sentence.trim().length > 0 && Math.random() > 0.6) {
                    return 'na ' + sentence;
                }
                return sentence;
            }).join('');
            
            return result.charAt(0).toUpperCase() + result.slice(1);
        }
